<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Clearing</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0908;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 50;
  }
  .room {
    width: 100vw;
    height: 100vh;
    background-image: url('images/freepik__empty-hallway-door-in-far-corner-slightly-open-dar__42280.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: reveal 3s ease-in forwards;
  }
  @keyframes reveal {
    0% { opacity: 0; }
    100% { opacity: 0.85; }
  }
</style>
</head>
<body>
  <div class="room"></div>
</body>
</html>
