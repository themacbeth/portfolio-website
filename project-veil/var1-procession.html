// Audio
let audioCtx,analyser,freqData,bands={kick:0,low:0,mid:0,high:0,all:0};
function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  let el=new Audio('coconut.mp3');el.crossOrigin='anonymous';el.loop=false;
  let src=audioCtx.createMediaElementSource(el);
  analyser=audioCtx.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=0.8;
  freqData=new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);analyser.connect(audioCtx.destination);
  el.play();
}
function analyse(){
  if(!analyser)return;analyser.getByteFrequencyData(freqData);
  let k=0,l=0,m=0,h=0;
  for(let i=0;i<=2;i++)k+=freqData[i];k/=765;
  for(let i=3;i<=9;i++)l+=freqData[i];l/=1785;
  for(let i=10;i<=46;i++)m+=freqData[i];m/=9435;
  for(let i=47;i<=120;i++)h+=freqData[i];h/=18870;
  let s=0.15;
  bands.kick+=(k-bands.kick)*s;bands.low+=(l-bands.low)*s;
  bands.mid+=(m-bands.mid)*s;bands.high+=(h-bands.high)*s;
  bands.all=(bands.kick+bands.low+bands.mid+bands.high)/4;
}

// Draw glyph with staggered per-stroke draw-on
function draw(g,cx,cy,sc,drawOn,col,wt){
  if(drawOn<=0)return;
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=wt;ctx.lineCap='round';ctx.lineJoin='round';
  let tot=g.s.length;
  for(let si=0;si<tot;si++){
    let st=si/tot, en=(si+1.5)/tot;
    let sd=drawOn<=st?0:drawOn>=en?1:(drawOn-st)/(en-st);
    sd=sd*sd*(3-2*sd); // smoothstep
    if(sd<=0)continue;
    let stroke=g.s[si];
    if(typeof stroke==='string'){
      let p=stroke.split(':'),a=p[1].split(',').map(Number);
      if(p[0]==='circle'){ctx.beginPath();ctx.arc((a[0]-.5)*sc,(a[1]-.5)*sc,a[2]*sc,0,TAU*sd);ctx.stroke();}
      else if(p[0]==='dot'&&sd>0.5){ctx.beginPath();ctx.arc((a[0]-.5)*sc,(a[1]-.5)*sc,wt*1.5,0,TAU);ctx.fill();}
    }else{
      ctx.beginPath();
      for(let i=0;i<stroke.length;i++){
        if(i/(stroke.length-1)>sd)break;
        let x=(stroke[i][0]-.5)*sc,y=(stroke[i][1]-.5)*sc;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

let frame=0,started=false;
const FPS=30,DURATION=30*FPS; // 30 sec
const GLYPH_TIME=DURATION/G.length; // time per glyph

function render(){
  if(!started){requestAnimationFrame(render);return;}
  frame++;
  if(frame>DURATION)frame=DURATION;
  analyse();

  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Which glyph?
  let gi=Math.min(G.length-1,Math.floor(frame/GLYPH_TIME));
  let localT=(frame-gi*GLYPH_TIME)/GLYPH_TIME;

  // Draw-on: accelerating ease
  let drawOn=localT<0.7 ? (localT/0.7) : 1;
  drawOn=drawOn*drawOn*(3-2*drawOn); // smoothstep

  // Audio-reactive scale
  let kick=1+bands.kick*0.2;
  let scale=SC*2.2*kick;

  // Color: alternate white/gold
  let col=gi%3===0?'#dab03e':'#e4e1da';

  draw(G[gi],CX,CY,scale,drawOn,col,2.5);

  // Registration marks
  ctx.strokeStyle='rgba(228,225,218,0.04)';ctx.lineWidth=0.5;
  let m=25,l=12;
  ctx.beginPath();
  ctx.moveTo(m+l,m);ctx.lineTo(m,m);ctx.lineTo(m,m+l);
  ctx.moveTo(W-m-l,m);ctx.lineTo(W-m,m);ctx.lineTo(W-m,m+l);
  ctx.moveTo(m+l,H-m);ctx.lineTo(m,H-m);ctx.lineTo(m,H-m-l);
  ctx.moveTo(W-m-l,H-m);ctx.lineTo(W-m,H-m);ctx.lineTo(W-m,H-m-l);
  ctx.stroke();

  requestAnimationFrame(render);
}

function begin(){
  if(started)return;started=true;
  document.getElementById('start').style.display='none';
  initAudio();frame=0;
}
render();
</script>
