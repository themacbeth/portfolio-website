<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dither Scene — Blobs</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #999; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 20;
const DS = 3;
let T = 0, on = false;

const OC = document.createElement('canvas');
const OX = OC.getContext('2d', { willReadFrequently: true });
let ow, oh;

function sz() {
  C.width = innerWidth; C.height = innerHeight;
  ow = Math.floor(C.width / DS);
  oh = Math.floor(C.height / DS);
  OC.width = ow; OC.height = oh;
}
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO_PI = PI * 2;

// ═══════════════════════════════════════════════
// Noise
// ═══════════════════════════════════════════════
const P = new Uint8Array(512);
(function(){const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
for(let i=0;i<512;i++)P[i]=p[i&255];})();
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}
function grad(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y);}
function perlin(x,y){
  const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=fade(xf),v=fade(yf);
  return lerp(lerp(grad(P[P[xi]+yi],xf,yf),grad(P[P[xi+1]+yi],xf-1,yf),u),
    lerp(grad(P[P[xi]+yi+1],xf,yf-1),grad(P[P[xi+1]+yi+1],xf-1,yf-1),u),v);
}
function fbm(x,y,oct){let v=0,a=0.5,f=1;for(let i=0;i<oct;i++){v+=a*perlin(x*f,y*f);a*=0.5;f*=2.1;}return v;}

// ═══════════════════════════════════════════════
// AUDIO — deep sea pressure drone
// ═══════════════════════════════════════════════
let AC, masterGain, bus, drones=[], noiseGain, noiseFilter, metalFilter, metalGain;

async function initAudio() {
  AC = new AudioContext();
  masterGain = AC.createGain(); masterGain.gain.value = 0; masterGain.connect(AC.destination);

  const rev = AC.createConvolver();
  const rL = AC.sampleRate * 10;
  const rB = AC.createBuffer(2, rL, AC.sampleRate);
  for (let ch=0;ch<2;ch++){const d=rB.getChannelData(ch);for(let i=0;i<rL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*4))*(.25+.75*Math.exp(-i/(AC.sampleRate*1.2)));}
  rev.buffer = rB;

  const dryG=AC.createGain();dryG.gain.value=0.18;
  const wetG=AC.createGain();wetG.gain.value=0.82;
  const dist=AC.createWaveShaper();const cv=new Float32Array(1024);
  for(let i=0;i<1024;i++)cv[i]=Math.tanh(((i/512)-1)*1.5);dist.curve=cv;dist.oversample='2x';
  bus=AC.createGain();bus.gain.value=1;
  bus.connect(dist);dist.connect(dryG);dist.connect(rev);rev.connect(wetG);dryG.connect(masterGain);wetG.connect(masterGain);

  // Sub — Db1 single low sine, very deep
  const s1=AC.createOscillator();s1.type='sine';s1.frequency.value=34.65;
  const s1g=AC.createGain();s1g.gain.value=0.18;
  const s1f=AC.createBiquadFilter();s1f.type='lowpass';s1f.frequency.value=45;s1f.Q.value=2;
  s1.connect(s1f);s1f.connect(s1g);s1g.connect(bus);s1.start();
  drones.push({osc:s1,gain:s1g,filter:s1f});

  // Slow beating pair — Db1 + Ab1 open 5th
  [34.65, 34.72, 51.91, 52.0].forEach(f=>{
    const o=AC.createOscillator();o.type='sine';o.frequency.value=f;
    const g=AC.createGain();g.gain.value=0.04;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=80;lp.Q.value=1;
    o.connect(lp);lp.connect(g);g.connect(bus);o.start();
    drones.push({osc:o,gain:g,filter:lp});
  });

  // Water noise — filtered low rumble
  const nB=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate);
  const nd=nB.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=AC.createBufferSource();ns.buffer=nB;ns.loop=true;
  noiseFilter=AC.createBiquadFilter();noiseFilter.type='lowpass';noiseFilter.frequency.value=400;noiseFilter.Q.value=0.3;
  noiseGain=AC.createGain();noiseGain.gain.value=0.06;
  ns.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(bus);ns.start();

  // Eerie resonance — very high Q pipe at shifting frequency
  const ms=AC.createBufferSource();ms.buffer=nB;ms.loop=true;
  metalFilter=AC.createBiquadFilter();metalFilter.type='bandpass';metalFilter.frequency.value=180;metalFilter.Q.value=40;
  metalGain=AC.createGain();metalGain.gain.value=0.015;
  ms.connect(metalFilter);metalFilter.connect(metalGain);metalGain.connect(bus);ms.start();

  // Second resonance — higher
  const m2s=AC.createBufferSource();m2s.buffer=nB;m2s.loop=true;
  const m2f=AC.createBiquadFilter();m2f.type='bandpass';m2f.frequency.value=360;m2f.Q.value=35;
  const m2g=AC.createGain();m2g.gain.value=0.008;
  m2s.connect(m2f);m2f.connect(m2g);m2g.connect(bus);m2s.start();

  // LFOs
  const l1=AC.createOscillator();l1.type='sine';l1.frequency.value=1/DUR;
  const l1g=AC.createGain();l1g.gain.value=100;l1.connect(l1g);l1g.connect(noiseFilter.frequency);l1.start();
  const l2=AC.createOscillator();l2.type='sine';l2.frequency.value=2/DUR;
  const l2g=AC.createGain();l2g.gain.value=60;l2.connect(l2g);l2g.connect(metalFilter.frequency);l2g.connect(m2f.frequency);l2.start();

  masterGain.gain.setTargetAtTime(0.35, AC.currentTime, 2.0);
}

function updateAudio(t,dis,env){
  if(!AC)return;const now=AC.currentTime;
  const breath=.5+.5*Math.sin(t/DUR*TWO_PI*2);
  if(noiseGain)noiseGain.gain.setTargetAtTime(.04+breath*.04+dis*.04,now,.25);
  if(metalGain)metalGain.gain.setTargetAtTime(.01+dis*.02,now,.2);
  for(let i=0;i<5;i++)if(drones[i]&&drones[i].filter)drones[i].filter.frequency.setTargetAtTime(35+breath*30+dis*40,now,.25);
  if(masterGain)masterGain.gain.setTargetAtTime(.32*env+.03,now,.2);
}

// ═══════════════════════════════════════════════
// VISUALS — organic blobs / jellyfish forms
// Metaball field + noise tendrils
// ═══════════════════════════════════════════════
const B8=[0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);

const NUM_BLOBS = 6;
const blobs = [];
for (let i = 0; i < NUM_BLOBS; i++) {
  blobs.push({
    phase: Math.random() * TWO_PI,
    speed: 0.3 + Math.random() * 0.5,
    orbitX: 0.2 + Math.random() * 0.3,
    orbitY: 0.15 + Math.random() * 0.25,
    cx: 0.3 + Math.random() * 0.4,
    cy: 0.3 + Math.random() * 0.4,
    radius: 0.06 + Math.random() * 0.1,
    pulseSpeed: 1 + Math.random() * 2,
  });
}

function disruption(t) {
  const p = t/DUR*TWO_PI;
  return .12+.08*Math.sin(p)+.06*Math.sin(p*3+1)+.04*Math.sin(p*5+2.5);
}
function envelope(t) { const p=t/DUR; if(p<.08)return p/.08; if(p>.92)return(1-p)/.08; return 1; }

function renderScene(t) {
  const phase = t / DUR;
  const env = envelope(t);
  const dis = disruption(t);
  const p = phase * TWO_PI;

  const img = OX.createImageData(ow, oh);
  const d = img.data;

  for (let y = 0; y < oh; y++) {
    for (let x = 0; x < ow; x++) {
      const nx = x / ow;
      const ny = y / oh;

      // Metaball field
      let field = 0;
      for (let i = 0; i < NUM_BLOBS; i++) {
        const b = blobs[i];
        const bx = b.cx + Math.sin(p * b.speed + b.phase) * b.orbitX;
        const by = b.cy + Math.cos(p * b.speed * 0.7 + b.phase + 1) * b.orbitY;
        const r = b.radius * (1 + 0.3 * Math.sin(p * b.pulseSpeed + i));

        const dx = nx - bx;
        const dy = (ny - by) * (ow / oh); // aspect correction
        const dist2 = dx * dx + dy * dy;

        // Metaball falloff
        field += (r * r) / (dist2 + 0.001);
      }

      // Threshold for solid form
      let brightness = 0;

      // Main blob body — bright when field is strong
      if (field > 2.0) {
        brightness = Math.min(1, (field - 2.0) * 0.3);
        // Internal structure — noise veins inside the blob
        const veinNoise = fbm(nx * 8 + t * 0.03, ny * 8 + t * 0.02, 4);
        brightness *= 0.6 + veinNoise * 0.6;
      }

      // Glow halo around blobs
      if (field > 0.5 && field <= 2.0) {
        const halo = (field - 0.5) / 1.5;
        brightness = Math.max(brightness, halo * 0.5);
      }

      // Scattered particles / spores in the void
      const sporeNoise = fbm(nx * 15 + t * 0.05, ny * 15 - t * 0.03, 3);
      if (sporeNoise > 0.35) {
        const sporeB = (sporeNoise - 0.35) * 2;
        brightness = Math.max(brightness, sporeB * 0.3);
      }

      // Tendril/filament structures connecting blobs
      for (let i = 0; i < NUM_BLOBS - 1; i++) {
        const b1 = blobs[i], b2 = blobs[(i+1)%NUM_BLOBS];
        const b1x = b1.cx + Math.sin(p*b1.speed+b1.phase)*b1.orbitX;
        const b1y = b1.cy + Math.cos(p*b1.speed*0.7+b1.phase+1)*b1.orbitY;
        const b2x = b2.cx + Math.sin(p*b2.speed+b2.phase)*b2.orbitX;
        const b2y = b2.cy + Math.cos(p*b2.speed*0.7+b2.phase+1)*b2.orbitY;

        // Distance from point to line segment
        const lx = b2x - b1x, ly = b2y - b1y;
        const len2 = lx*lx + ly*ly;
        if (len2 > 0.001) {
          let tt = Math.max(0, Math.min(1, ((nx-b1x)*lx + (ny-b1y)*ly) / len2));
          const px = b1x + tt * lx, py = b1y + tt * ly;
          const dd = Math.sqrt((nx-px)*(nx-px) + (ny-py)*(ny-py));

          // Wiggly tendril
          const wiggle = fbm(tt * 5 + i * 3 + t * 0.04, t * 0.02, 3) * 0.03;
          const tendrilWidth = 0.008 + wiggle;

          if (dd < tendrilWidth && field > 0.3) {
            const tendrilB = (1 - dd / tendrilWidth) * 0.5;
            brightness = Math.max(brightness, tendrilB);
          }
        }
      }

      // Swirling background texture — very subtle
      const bgSwirl = fbm(nx * 3 + Math.sin(p) * 0.5, ny * 3 + Math.cos(p) * 0.5, 5);
      if (bgSwirl > 0.2) {
        brightness = Math.max(brightness, (bgSwirl - 0.2) * 0.12);
      }

      // Vignette
      const vx = (nx-.5)*2, vy = (ny-.5)*2;
      brightness *= Math.max(0, 1 - (vx*vx+vy*vy) * 0.3);

      brightness = Math.max(0, Math.min(1, brightness * env));

      const idx = (y * ow + x) * 4;
      const v = Math.floor(brightness * 255);
      d[idx] = d[idx+1] = d[idx+2] = v;
      d[idx+3] = 255;
    }
  }

  OX.putImageData(img, 0, 0);
  applyDither(t, dis);
  X.imageSmoothingEnabled = false;
  X.drawImage(OC, 0, 0, ow, oh, 0, 0, C.width, C.height);
  updateAudio(t, dis, env);
}

function applyDither(time, dis) {
  const img = OX.getImageData(0,0,ow,oh); const d = img.data;
  const ph = Math.floor(time * 2) % 8;
  for (let y=0;y<oh;y++) for (let x=0;x<ow;x++) {
    const i = (y*ow+x)*4;
    const br = d[i]/255;
    const tx=(x+ph)%8, ty=(y+ph)%8;
    let th = B8[ty*8+tx];
    if (dis>.15 && (y+Math.floor(time*7))%11 < dis*3) th = 1-th;
    const on = br > th;
    d[i]=d[i+1]=d[i+2]=on?255:0; d[i+3]=255;
  }
  OX.putImageData(img,0,0);
}

let last=0;
function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now();const dt=Math.min((now-last)/1000,.05);last=now;T+=dt;if(T>=DUR)T-=DUR;renderScene(T);}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script>
</body>
</html>
