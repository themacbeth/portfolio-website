<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Machine — Membrane</title>
<style>
  *{margin:0;padding:0}body{background:#000;overflow:hidden}
  canvas{display:block;image-rendering:pixelated}
  #start{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
  #start span{color:#999;font:13px monospace;opacity:.5}.gone{display:none!important}
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C=document.getElementById('c'),X=C.getContext('2d'),DUR=20,DS=3;
let T=0,on=false;
const OC=document.createElement('canvas'),OX=OC.getContext('2d',{willReadFrequently:true});
let ow,oh;
function sz(){C.width=innerWidth;C.height=innerHeight;ow=Math.floor(C.width/DS);oh=Math.floor(C.height/DS);OC.width=ow;OC.height=oh}
sz();addEventListener('resize',sz);
const PI=Math.PI,TWO_PI=PI*2;
const P=new Uint8Array(512);
(function(){const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}for(let i=0;i<512;i++)P[i]=p[i&255]})();
function fade(t){return t*t*t*(t*(t*6-15)+10)}function lerp(a,b,t){return a+t*(b-a)}
function grad(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y)}
function perlin(x,y){const xi=Math.floor(x)&255,yi=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf);return lerp(lerp(grad(P[P[xi]+yi],xf,yf),grad(P[P[xi+1]+yi],xf-1,yf),u),lerp(grad(P[P[xi]+yi+1],xf,yf-1),grad(P[P[xi+1]+yi+1],xf-1,yf-1),u),v)}
function fbm(x,y,o){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*perlin(x*f,y*f);a*=.5;f*=2.1}return v}

// AUDIO — breath / heartbeat
let AC,masterGain,bus,drones=[],noiseGain,noiseFilter;
async function initAudio(){
  AC=new AudioContext();masterGain=AC.createGain();masterGain.gain.value=0;masterGain.connect(AC.destination);
  const rev=AC.createConvolver(),rL=AC.sampleRate*8,rB=AC.createBuffer(2,rL,AC.sampleRate);
  for(let ch=0;ch<2;ch++){const d=rB.getChannelData(ch);for(let i=0;i<rL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*3.5))*(.3+.7*Math.exp(-i/(AC.sampleRate*1)))}
  rev.buffer=rB;
  const dG=AC.createGain(),wG=AC.createGain();dG.gain.value=.25;wG.gain.value=.75;
  const dist=AC.createWaveShaper(),cv=new Float32Array(1024);for(let i=0;i<1024;i++)cv[i]=Math.tanh(((i/512)-1)*1.8);dist.curve=cv;dist.oversample='2x';
  bus=AC.createGain();bus.gain.value=1;bus.connect(dist);dist.connect(dG);dist.connect(rev);rev.connect(wG);dG.connect(masterGain);wG.connect(masterGain);

  // Sub — heartbeat frequency, B0
  const s=AC.createOscillator();s.type='sine';s.frequency.value=30.87;const sg=AC.createGain();sg.gain.value=0;
  const sf=AC.createBiquadFilter();sf.type='lowpass';sf.frequency.value=40;sf.Q.value=3;s.connect(sf);sf.connect(sg);sg.connect(bus);s.start();drones.push({osc:s,gain:sg,filter:sf});

  // Breath pad — B1+F#2 (open 5th)
  [61.74,92.5].forEach(f=>{const o=AC.createOscillator();o.type='sine';o.frequency.value=f;const g=AC.createGain();g.gain.value=.05;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=100;lp.Q.value=1;o.connect(lp);lp.connect(g);g.connect(bus);o.start();drones.push({osc:o,gain:g,filter:lp})});

  // Breath noise — filtered to sound like inhale/exhale
  const nB=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate),nd=nB.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=AC.createBufferSource();ns.buffer=nB;ns.loop=true;
  noiseFilter=AC.createBiquadFilter();noiseFilter.type='bandpass';noiseFilter.frequency.value=500;noiseFilter.Q.value=.4;
  noiseGain=AC.createGain();noiseGain.gain.value=0;ns.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(bus);ns.start();

  // Body resonance
  const ms=AC.createBufferSource();ms.buffer=nB;ms.loop=true;
  const mf=AC.createBiquadFilter();mf.type='bandpass';mf.frequency.value=180;mf.Q.value=15;
  const mg=AC.createGain();mg.gain.value=.015;ms.connect(mf);mf.connect(mg);mg.connect(bus);ms.start();

  const l1=AC.createOscillator();l1.type='sine';l1.frequency.value=1/DUR;const l1g=AC.createGain();l1g.gain.value=200;l1.connect(l1g);l1g.connect(noiseFilter.frequency);l1.start();
  masterGain.gain.setTargetAtTime(.35,AC.currentTime,2);
}
function updateAudio(t,dis,env){
  if(!AC)return;const now=AC.currentTime;
  // Breathing cycle — 4 breaths per loop
  const breathPhase=(t/DUR*4)%1;
  const inhale=breathPhase<.4?breathPhase/.4:0;
  const exhale=breathPhase>.45&&breathPhase<.85?(breathPhase-.45)/.4:0;
  const breathVol=inhale*.08+exhale*.06;
  if(noiseGain)noiseGain.gain.setTargetAtTime(breathVol,now,.05);
  // Shift noise freq — inhale higher, exhale lower
  if(noiseFilter)noiseFilter.frequency.setTargetAtTime(300+inhale*600-exhale*100,now,.05);

  // Heartbeat on sub — 3 beats per loop
  const heartPhase=(t/DUR*3)%1;
  const beat=heartPhase<.05?1:heartPhase<.15?Math.exp(-(heartPhase-.05)*40)*.5:0;
  if(drones[0])drones[0].gain.gain.setTargetAtTime(beat*.2,now,.005);

  // Pad swells with breath
  const padVol=.03+inhale*.03;
  for(let i=1;i<3;i++)if(drones[i])drones[i].gain.gain.setTargetAtTime(padVol,now,.1);
  if(masterGain)masterGain.gain.setTargetAtTime(.32*env+.03,now,.15);
}

const B8=[0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);

// Breathing disruption synced to audio
function disruption(t){
  const breathPhase=(t/DUR*4)%1;
  return breathPhase<.4?breathPhase/.4*.6:.6*Math.max(0,1-(breathPhase-.4)/.5);
}
function envelope(t){const p=t/DUR;if(p<.08)return p/.08;if(p>.92)return(1-p)/.08;return 1}

function renderScene(t){
  const phase=t/DUR,env=envelope(t),dis=disruption(t),p=phase*TWO_PI;
  const img=OX.createImageData(ow,oh),d=img.data,aspect=ow/oh;

  // Breathing expansion
  const breathScale=1+dis*.15;
  const cx=.5,cy=.5;

  for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){
    const nx=x/ow,ny=y/oh;
    // Apply breathing distortion — expand from center
    const dx=(nx-cx)/breathScale+cx;
    const dy=(ny-cy)/breathScale+cy;
    let brightness=0;

    // Membrane surface — warped sphere-like form
    const memDx=dx-cx,memDy=(dy-cy)*aspect;
    const memDist=Math.sqrt(memDx*memDx+memDy*memDy);
    const memR=.35+.05*Math.sin(p*2);

    if(memDist<memR){
      // Inside membrane — organic tissue
      const surfaceNorm=Math.sqrt(1-Math.pow(memDist/memR,2));

      // Rim lighting
      brightness+=Math.pow(1-surfaceNorm,3)*1.2;

      // Surface veins
      const veinAngle=Math.atan2(memDy,memDx);
      const vein1=fbm(veinAngle*3+memDist*10+t*.01,memDist*8,4);
      const vein2=fbm(veinAngle*5+memDist*15+10,memDist*12+t*.008,3);
      if(vein1>.2)brightness+=.3*(vein1-.2)*surfaceNorm;
      if(vein2>.25)brightness+=.2*(vein2-.25)*surfaceNorm;

      // Internal glow — pulsing with breath
      const innerGlow=Math.exp(-memDist*6)*(.3+dis*.4);
      brightness+=innerGlow*surfaceNorm;

      // Subsurface texture
      const tissue=fbm(dx*12+t*.005,dy*12,5);
      brightness+=Math.max(0,tissue)*.2*surfaceNorm;

      // Dark nucleus
      if(memDist<.08){
        const nucGlow=Math.exp(-memDist*40);
        brightness+=nucGlow*.4;
        const nucTex=perlin(dx*30,dy*30+t*.01);
        brightness+=Math.max(0,nucTex)*.2;
      }
    } else {
      // Outside — tight glow only, clean dark background
      const outerDist=memDist-memR;
      const outerGlow=Math.exp(-outerDist*15)*.08;
      brightness+=outerGlow;
    }

    const vx=(nx-.5)*2,vy=(ny-.5)*2;brightness*=Math.max(0,1-(vx*vx+vy*vy)*.2);
    brightness=Math.max(0,Math.min(1,brightness*env));
    const idx=(y*ow+x)*4,v=Math.floor(brightness*255);
    d[idx]=d[idx+1]=d[idx+2]=v;d[idx+3]=255;
  }
  OX.putImageData(img,0,0);applyDither(t,dis);
  X.imageSmoothingEnabled=false;X.drawImage(OC,0,0,ow,oh,0,0,C.width,C.height);updateAudio(t,dis,env);
}

function applyDither(time,dis){const img=OX.getImageData(0,0,ow,oh),d=img.data,ph=Math.floor(time*2)%8;
for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){const i=(y*ow+x)*4,br=d[i]/255,tx=(x+ph)%8,ty=(y+ph)%8;let th=B8[ty*8+tx];if(dis>.4&&(y+Math.floor(time*11))%7<dis*1.5)th=1-th;d[i]=d[i+1]=d[i+2]=br>th?255:0;d[i+3]=255}OX.putImageData(img,0,0)}

let last=0;function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now(),dt=Math.min((now-last)/1000,.05);last=now;T+=dt;if(T>=DUR)T-=DUR;renderScene(T)}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script></body></html>
