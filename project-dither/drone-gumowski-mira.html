<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drone — Gumowski-Mira</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #a00; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 20;
const DS = 6;
let T = 0, on = false;

const OC = document.createElement('canvas');
const OX = OC.getContext('2d', { willReadFrequently: true });
let ow, oh;

function sz() {
  C.width = innerWidth; C.height = innerHeight;
  ow = Math.floor(C.width / DS);
  oh = Math.floor(C.height / DS);
  OC.width = ow; OC.height = oh;
}
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO_PI = PI * 2;

// ═══════════════════════════════════════════════
// AUDIO — cavernous low drone
// Root: Eb1 + A1 tritone — eerie interval
// ═══════════════════════════════════════════════
let AC, masterGain, bus;
let drones = [], noiseGain, noiseFilter, metalFilter, metalGain;

async function initAudio() {
  AC = new AudioContext();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(AC.destination);

  const reverbNode = AC.createConvolver();
  const revLen = AC.sampleRate * 8;
  const revBuf = AC.createBuffer(2, revLen, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) {
      data[i] = (Math.random()*2-1) * Math.exp(-i/(AC.sampleRate*3.5)) * (0.3+0.7*Math.exp(-i/(AC.sampleRate*0.6)));
    }
  }
  reverbNode.buffer = revBuf;

  const dryG = AC.createGain(); dryG.gain.value = 0.28;
  const wetG = AC.createGain(); wetG.gain.value = 0.72;
  const distNode = AC.createWaveShaper();
  const curve = new Float32Array(1024);
  for (let i = 0; i < 1024; i++) curve[i] = Math.tanh(((i/512)-1)*2.0);
  distNode.curve = curve; distNode.oversample = '2x';

  bus = AC.createGain(); bus.gain.value = 1;
  bus.connect(distNode); distNode.connect(dryG); distNode.connect(reverbNode);
  reverbNode.connect(wetG); dryG.connect(masterGain); wetG.connect(masterGain);

  // Sub — Eb1+A1, mixed sine+sawtooth for gritty warmth
  [38.89, 55.0].forEach(freq => {
    const osc = AC.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = 0.13;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 55; lp.Q.value = 5;
    osc.connect(lp); lp.connect(g); g.connect(bus); osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });
  // Extra grit layer
  const gritOsc = AC.createOscillator(); gritOsc.type = 'sawtooth'; gritOsc.frequency.value = 39.05;
  const gritG = AC.createGain(); gritG.gain.value = 0.04;
  const gritLP = AC.createBiquadFilter(); gritLP.type = 'lowpass'; gritLP.frequency.value = 100; gritLP.Q.value = 6;
  gritOsc.connect(gritLP); gritLP.connect(gritG); gritG.connect(bus); gritOsc.start();
  drones.push({ osc: gritOsc, gain: gritG, filter: gritLP });

  // Mid — wide minor 7th Eb2+Db3 (distant, cavernous)
  [77.78, 138.59].forEach(freq => {
    const osc = AC.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = 0.025;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200; lp.Q.value = 1.5;
    osc.connect(lp); lp.connect(g); g.connect(bus); osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });

  // Ghost — Bb4
  const go = AC.createOscillator(); go.type = 'sine'; go.frequency.value = 466;
  const gg = AC.createGain(); gg.gain.value = 0.008;
  const gf = AC.createBiquadFilter(); gf.type = 'bandpass'; gf.frequency.value = 466; gf.Q.value = 12;
  go.connect(gf); gf.connect(gg); gg.connect(bus); go.start();
  drones.push({ osc: go, gain: gg, filter: gf });

  // Noise
  const nBuf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
  const ns = AC.createBufferSource(); ns.buffer = nBuf; ns.loop = true;
  noiseFilter = AC.createBiquadFilter(); noiseFilter.type='bandpass'; noiseFilter.frequency.value=350; noiseFilter.Q.value=0.5;
  noiseGain = AC.createGain(); noiseGain.gain.value = 0.025;
  ns.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(bus); ns.start();

  // Metal — multiple resonant pipes (like distant machinery)
  const ms = AC.createBufferSource(); ms.buffer = nBuf; ms.loop = true;
  metalFilter = AC.createBiquadFilter(); metalFilter.type='bandpass'; metalFilter.frequency.value=220; metalFilter.Q.value=70;
  metalGain = AC.createGain(); metalGain.gain.value = 0.01;
  ms.connect(metalFilter); metalFilter.connect(metalGain); metalGain.connect(bus); ms.start();

  const m2s = AC.createBufferSource(); m2s.buffer = nBuf; m2s.loop = true;
  const m2f = AC.createBiquadFilter(); m2f.type='bandpass'; m2f.frequency.value=440; m2f.Q.value=65;
  const m2g = AC.createGain(); m2g.gain.value = 0.007;
  m2s.connect(m2f); m2f.connect(m2g); m2g.connect(bus); m2s.start();

  const m3s = AC.createBufferSource(); m3s.buffer = nBuf; m3s.loop = true;
  const m3f = AC.createBiquadFilter(); m3f.type='bandpass'; m3f.frequency.value=660; m3f.Q.value=60;
  const m3g = AC.createGain(); m3g.gain.value = 0.005;
  m3s.connect(m3f); m3f.connect(m3g); m3g.connect(bus); m3s.start();

  // Slow LFO — single cycle, matches the single pulse
  const l1 = AC.createOscillator(); l1.type='sine'; l1.frequency.value=1/DUR;
  const l1g = AC.createGain(); l1g.gain.value=60;
  l1.connect(l1g); l1g.connect(noiseFilter.frequency); l1.start();
  const l2 = AC.createOscillator(); l2.type='sine'; l2.frequency.value=1/DUR;
  const l2g = AC.createGain(); l2g.gain.value=80;
  l2.connect(l2g); l2g.connect(metalFilter.frequency); l2g.connect(m2f.frequency); l2g.connect(m3f.frequency); l2.start();

  masterGain.gain.setTargetAtTime(0.35, AC.currentTime, 1.5);
}

function updateAudio(t, dis, env) {
  if (!AC) return;
  const now = AC.currentTime;
  // Single slow swell — resonant pipes ring out on the pulse
  if (noiseGain) noiseGain.gain.setTargetAtTime(0.015+dis*0.08, now, 0.1);
  if (metalGain) metalGain.gain.setTargetAtTime(0.006+dis*0.025, now, 0.08);
  for (let i=0;i<3;i++) if(drones[i]&&drones[i].filter) drones[i].filter.frequency.setTargetAtTime(50+dis*120,now,0.1);
  const mc = 180+dis*200;
  for (let i=3;i<5;i++) if(drones[i]&&drones[i].filter) drones[i].filter.frequency.setTargetAtTime(mc,now,0.1);
  if (drones[5]) drones[5].gain.gain.setTargetAtTime(0.005+dis*0.015,now,0.1);
  if (masterGain) masterGain.gain.setTargetAtTime(0.30*env+0.03,now,0.15);
}

// ═══════════════════════════════════════════════
// VISUALS — Gumowski-Mira attractor
// x' = y + F(x),  y' = -x + F(x')
// F(x) = μ·x + 2(1-μ)·x²/(1+x²)
// ═══════════════════════════════════════════════
const B8 = [0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);
const rX = (v,a) => { const c=Math.cos(a),s=Math.sin(a); return [v[0],v[1]*c-v[2]*s,v[1]*s+v[2]*c]; };
const rY = (v,a) => { const c=Math.cos(a),s=Math.sin(a); return [v[0]*c+v[2]*s,v[1],-v[0]*s+v[2]*c]; };

const N_POINTS = 200;

function gmF(x, mu) {
  return mu * x + 2 * (1 - mu) * x * x / (1 + x * x);
}

// Single heavy pulse at halfway — long slow build and decay
function disruption(t) {
  const phase = t / DUR;
  let dist = Math.abs(phase - 0.5);
  dist = Math.min(dist, 1 - dist);
  return Math.exp(-dist * DUR * 3) * 1.5;
}
function envelope(t) { const p=t/DUR; if(p<0.1)return p/0.1; if(p>0.9)return(1-p)/0.1; return 1; }

function addGlow() {
  const img=OX.getImageData(0,0,ow,oh); const d=img.data;
  const src=new Uint8Array(ow*oh); for(let i=0;i<src.length;i++)src[i]=d[i*4];
  for(let y=1;y<oh-1;y++)for(let x=1;x<ow-1;x++){const i=y*ow+x;const avg=(src[i-ow-1]+src[i-ow]+src[i-ow+1]+src[i-1]+src[i]+src[i+1]+src[i+ow-1]+src[i+ow]+src[i+ow+1])/9;const idx=i*4;d[idx]=d[idx+1]=d[idx+2]=Math.min(255,src[i]+(avg*0.6)|0);}
  OX.putImageData(img,0,0);
}
function applyDither(time,dis) {
  const img=OX.getImageData(0,0,ow,oh);const d=img.data;const ph=Math.floor(time*3)%8;
  for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){const i=(y*ow+x)*4;const br=d[i]/255;const tx=(x+ph)%8;const ty=(y+ph)%8;let th=B8[ty*8+tx];if(dis>0.3&&(y+Math.floor(time*13))%6<dis*1.8)th=1-th;const on=br>th;d[i]=on?180:0;d[i+1]=on?12:0;d[i+2]=on?8:0;d[i+3]=255;}
  OX.putImageData(img,0,0);
}

function render(t) {
  const phase=t/DUR, env=envelope(t), dis=disruption(t);
  const visCount=Math.max(2,Math.floor(env*N_POINTS));

  // μ breathes slowly — different shapes emerge
  const mu = -0.22 + 0.08 * Math.sin(phase * TWO_PI);

  OX.fillStyle='#000'; OX.fillRect(0,0,ow,oh);

  const scatterAmt=dis*0.8;
  const rotYa=phase*TWO_PI, rotXa=Math.sin(phase*TWO_PI)*0.3;
  const scale=Math.min(ow,oh)*0.012, cx=ow/2, cy=oh/2;

  OX.beginPath();
  let px=0, py=12, started=false;
  for(let i=0;i<visCount;i++){
    const fx = gmF(px, mu);
    const nx = py + fx;
    const fx2 = gmF(nx, mu);
    const ny = -px + fx2;
    px=nx; py=ny;

    let x=px, y=py;
    if(scatterAmt>0.01){
      const mag=Math.sqrt(x*x+y*y)||1;
      x+=(x/mag)*scatterAmt*10+Math.sin(i*4.3+t*22)*scatterAmt*3;
      y+=(y/mag)*scatterAmt*10;
    }

    const z=Math.sin(i*0.005+phase*TWO_PI)*3;
    let v=rX([x,y,z],rotXa); v=rY(v,rotYa);
    const sx=v[0]*scale+cx, sy=-v[1]*scale+cy;
    if(!started){OX.moveTo(sx,sy);started=true;}else OX.lineTo(sx,sy);
  }
  OX.strokeStyle=`rgba(255,255,255,${(0.25+env*0.35).toFixed(2)})`;
  OX.lineWidth=0.4; OX.stroke();
  addGlow(); applyDither(t,dis);
  X.imageSmoothingEnabled=false;
  X.drawImage(OC,0,0,ow,oh,0,0,C.width,C.height);
  updateAudio(t,dis,env);
}

let last=0;
function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now();const d=Math.min((now-last)/1000,0.05);last=now;T+=d;if(T>=DUR)T-=DUR;render(T);}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script>
</body>
</html>
