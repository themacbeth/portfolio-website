<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Machine — Galaxy</title>
<style>
  *{margin:0;padding:0}body{background:#000;overflow:hidden}
  canvas{display:block;image-rendering:pixelated}
  #start{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
  #start span{color:#999;font:13px monospace;opacity:.5}.gone{display:none!important}
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const DUR = 20;
const DS = 3;

// Bayer 8x8 matrix
const B8 = [
  0/64, 32/64, 8/64, 40/64, 2/64, 34/64, 10/64, 42/64,
  48/64, 16/64, 56/64, 24/64, 50/64, 18/64, 58/64, 26/64,
  12/64, 44/64, 4/64, 36/64, 14/64, 46/64, 6/64, 38/64,
  60/64, 28/64, 52/64, 20/64, 62/64, 30/64, 54/64, 22/64,
  3/64, 35/64, 11/64, 43/64, 1/64, 33/64, 9/64, 41/64,
  51/64, 19/64, 59/64, 27/64, 49/64, 17/64, 57/64, 25/64,
  15/64, 47/64, 7/64, 39/64, 13/64, 45/64, 5/64, 37/64,
  63/64, 31/64, 55/64, 23/64, 61/64, 29/64, 53/64, 21/64
];

// Canvas setup
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {alpha: true});
const ratio = window.devicePixelRatio || 1;
canvas.width = 800 * ratio;
canvas.height = 800 * ratio;
canvas.style.width = '800px';
canvas.style.height = '800px';

const w = 800;
const h = 800;
const ow = Math.floor(w / DS);
const oh = Math.floor(h / DS);

const OC = document.createElement('canvas');
OC.width = ow;
OC.height = oh;
const OX = OC.getContext('2d');

// Perlin noise implementation
const P = new Uint8Array(512);
(function(){
  const p = new Uint8Array(256);
  for(let i = 0; i < 256; i++) p[i] = i;
  for(let i = 255; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for(let i = 0; i < 512; i++) P[i] = p[i & 255];
})();

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+t*(b-a)}
function grad(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y)}
function perlin(x,y){
  const xi=Math.floor(x)&255,yi=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf);
  return lerp(lerp(grad(P[P[xi]+yi],xf,yf),grad(P[P[xi+1]+yi],xf-1,yf),u),lerp(grad(P[P[xi]+yi+1],xf,yf-1),grad(P[P[xi+1]+yi+1],xf-1,yf-1),u),v)
}
function fbm(x,y,o){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*perlin(x*f,y*f);a*=.5;f*=2.1}return v}

// Hash-based noise for stars
function hash(x, y) {
  let h = 2654435761n ^ BigInt(x) * 2246822519n ^ BigInt(y) * 3266489917n;
  h ^= (h >> 16n);
  h *= 2246822519n;
  h ^= (h >> 13n);
  return Number(h & 0xFFFFFFFFn) / 0x100000000;
}

// Audio context
let audioCtx;
let nodes = {};
let masterGain;
let on = false;
let last = 0;

async function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();

  // Reverb setup with convolver
  const response = audioCtx.createBuffer(2, audioCtx.sampleRate * 10, audioCtx.sampleRate);
  const left = response.getChannelData(0);
  const right = response.getChannelData(1);
  for(let i = 0; i < response.length; i++) {
    left[i] = (Math.random() - 0.5) * 0.3 * Math.exp(-(i / audioCtx.sampleRate) / 3);
    right[i] = (Math.random() - 0.5) * 0.3 * Math.exp(-(i / audioCtx.sampleRate) / 3);
  }
  const convolver = audioCtx.createConvolver();
  convolver.buffer = response;

  const waveshaper = audioCtx.createWaveShaper();
  waveshaper.curve = new Float32Array(2048);
  for(let i = 0; i < 2048; i++) {
    waveshaper.curve[i] = Math.tanh((2 * i / 2048 - 1) * 2);
  }

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 3);

  // Sub: C1 + G1
  const sub1 = audioCtx.createOscillator();
  sub1.frequency.value = 32.7; // C1
  sub1.start();
  const sub2 = audioCtx.createOscillator();
  sub2.frequency.value = 49; // G1
  sub2.start();

  const subGain = audioCtx.createGain();
  subGain.gain.value = 0.05;
  const subFilter = audioCtx.createBiquadFilter();
  subFilter.type = 'lowpass';
  subFilter.frequency.value = 60;

  sub1.connect(subGain);
  sub2.connect(subGain);
  subGain.connect(subFilter);

  // Mid: C2 + G2 + D3
  const mid1 = audioCtx.createOscillator();
  mid1.frequency.value = 65.41;
  mid1.start();
  const mid2 = audioCtx.createOscillator();
  mid2.frequency.value = 98;
  mid2.start();
  const mid3 = audioCtx.createOscillator();
  mid3.frequency.value = 146.83;
  mid3.start();

  const midGain = audioCtx.createGain();
  midGain.gain.value = 0.04;
  const midFilter = audioCtx.createBiquadFilter();
  midFilter.type = 'bandpass';
  midFilter.frequency.value = 100;
  midFilter.Q.value = 2;

  mid1.connect(midGain);
  mid2.connect(midGain);
  mid3.connect(midGain);
  midGain.connect(midFilter);

  // Ghost shimmer: 880Hz + 1320Hz
  const ghost1 = audioCtx.createOscillator();
  ghost1.frequency.value = 880;
  ghost1.start();
  const ghost2 = audioCtx.createOscillator();
  ghost2.frequency.value = 1320;
  ghost2.start();

  const ghostGain = audioCtx.createGain();
  ghostGain.gain.value = 0.008;
  const ghostFilter = audioCtx.createBiquadFilter();
  ghostFilter.type = 'peaking';
  ghostFilter.frequency.value = 1000;
  ghostFilter.Q.value = 15;

  ghost1.connect(ghostGain);
  ghost2.connect(ghostGain);
  ghostGain.connect(ghostFilter);

  // Noise: bandpass 2000Hz
  const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for(let i = 0; i < noiseData.length; i++) {
    noiseData[i] = Math.random() - 0.5;
  }
  const noiseNode = audioCtx.createBufferSource();
  noiseNode.buffer = noiseBuffer;
  noiseNode.loop = true;
  noiseNode.start();

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.006;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 2000;
  noiseFilter.Q.value = 0.3;

  noiseNode.connect(noiseGain);
  noiseGain.connect(noiseFilter);

  // LFO modulation
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 1 / DUR;
  lfo.start();

  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 20;

  lfo.connect(lfoGain);
  lfoGain.connect(sub1.frequency);
  lfoGain.connect(sub2.frequency);

  // Mix everything
  const mixer = audioCtx.createGain();
  subFilter.connect(mixer);
  midFilter.connect(mixer);
  ghostFilter.connect(mixer);
  noiseFilter.connect(mixer);

  mixer.connect(dryGain);
  mixer.connect(waveshaper);
  waveshaper.connect(convolver);

  dryGain.connect(masterGain);
  convolver.connect(wetGain);
  wetGain.connect(masterGain);

  dryGain.gain.value = 0.15;
  wetGain.gain.value = 0.85;

  masterGain.connect(audioCtx.destination);

  nodes = {sub1, sub2, mid1, mid2, mid3, ghost1, ghost2, noiseNode, lfo};
}

function applyDither(time, dis) {
  const img = OX.getImageData(0, 0, ow, oh);
  const d = img.data;
  const ph = Math.floor(time * 1.5) % 8;
  for(let y = 0; y < oh; y++) {
    for(let x = 0; x < ow; x++) {
      const i = (y * ow + x) * 4;
      const br = d[i] / 255;
      const tx = (x + ph) % 8;
      const ty = (y + ph) % 8;
      const th = B8[ty * 8 + tx];
      d[i] = d[i+1] = d[i+2] = br > th ? 255 : 0;
      d[i+3] = 255;
    }
  }
  OX.putImageData(img, 0, 0);
}

function renderGalaxy(time) {
  const phase = (time % DUR) / DUR;

  OX.fillStyle = '#000';
  OX.fillRect(0, 0, ow, oh);

  // Compute modulation
  const rotation = phase * Math.PI * 2 * 0.5;
  const armTight = 0.3 + 0.05 * Math.sin(phase * Math.PI * 2);
  const dustIntensity = 0.5 + 0.2 * Math.sin(phase * Math.PI * 2 * 0.33);

  // Create brightness field
  const field = new Float32Array(ow * oh);

  const cx = ow / 2;
  const cy = oh / 2;
  const maxDist = Math.sqrt(cx * cx + cy * cy);

  for(let y = 0; y < oh; y++) {
    for(let x = 0; x < ow; x++) {
      const dx = x - cx;
      const dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const baseAngle = Math.atan2(dy, dx);

      let brightness = 0;

      // Core: bright dense center
      if(dist < 30) {
        brightness += Math.exp(-(dist * dist) / (2 * 100));
      }

      // Main structure: spiral arms
      const a = 0.5;
      const b = armTight / (2 * Math.PI);
      const expectedR = a * Math.exp(b * baseAngle);

      // Arm 1
      const arm1Angle = (baseAngle - rotation) % (2 * Math.PI);
      const arm1R = a * Math.exp(b * arm1Angle);
      const distArm1 = Math.abs(dist - arm1R);
      const armWidth = 25 + fbm(x / 50, y / 50, 3) * 10;
      brightness += 0.6 * Math.exp(-(distArm1 * distArm1) / (2 * armWidth * armWidth)) * Math.exp(-dist / (maxDist * 0.8));

      // Arm 2 (opposite side)
      const arm2Angle = (baseAngle + Math.PI - rotation) % (2 * Math.PI);
      const arm2R = a * Math.exp(b * arm2Angle);
      const distArm2 = Math.abs(dist - arm2R);
      brightness += 0.6 * Math.exp(-(distArm2 * distArm2) / (2 * armWidth * armWidth)) * Math.exp(-dist / (maxDist * 0.8));

      // Dust lanes
      const dust1Angle = (baseAngle - rotation - 0.15) % (2 * Math.PI);
      const dust1R = a * Math.exp(b * dust1Angle);
      const dustDist1 = Math.abs(dist - dust1R);
      brightness -= 0.3 * Math.exp(-(dustDist1 * dustDist1) / (2 * 15 * 15)) * dustIntensity;

      const dust2Angle = (baseAngle + Math.PI - rotation + 0.15) % (2 * Math.PI);
      const dust2R = a * Math.exp(b * dust2Angle);
      const dustDist2 = Math.abs(dist - dust2R);
      brightness -= 0.3 * Math.exp(-(dustDist2 * dustDist2) / (2 * 15 * 15)) * dustIntensity;

      // Stars: hash-based noise
      const starNoise = hash(Math.floor(x / 4) * 73 + 13, Math.floor(y / 4) * 97 + 29);
      if(starNoise > 0.92) {
        brightness += 0.5 + 0.3 * Math.sin(phase * Math.PI * 2 * (starNoise * 3));
      }

      // Outer halo: dim scattered stars
      if(dist > 100 && dist < maxDist - 10) {
        const haloNoise = hash(Math.floor(x / 8) * 127 + 31, Math.floor(y / 8) * 149 + 37);
        if(haloNoise > 0.96) {
          brightness += 0.2 * Math.exp(-(dist - 100) / (maxDist * 0.3));
        }
      }

      // Envelope fade
      const edgeFade = Math.exp(-Math.pow((dist / maxDist - 0.8) * 5, 2));
      brightness *= edgeFade;

      field[(y * ow + x)] = Math.max(0, Math.min(1, brightness));
    }
  }

  // Render field to canvas
  const imgData = OX.createImageData(ow, oh);
  const d = imgData.data;
  for(let i = 0; i < field.length; i++) {
    const v = Math.floor(field[i] * 255);
    d[i * 4] = v;
    d[i * 4 + 1] = v;
    d[i * 4 + 2] = v;
    d[i * 4 + 3] = 255;
  }
  OX.putImageData(imgData, 0, 0);

  // Apply dither
  applyDither(time, phase);

  // Scale up to display canvas
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(OC, 0, 0, canvas.width, canvas.height);
}

function frame() {
  if(!on) return;
  const now = performance.now() / 1000;
  const elapsed = last ? now - last : 0;
  last = now;

  const time = (now % DUR);
  renderGalaxy(time);

  requestAnimationFrame(frame);
}

async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true;
  last = performance.now() / 1000;
  frame();
}

if(window.self !== window.top) {
  autoStart();
} else {
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}

</script>
</body>
</html>
