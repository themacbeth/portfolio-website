<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Machine — Rain</title>
<style>
  *{margin:0;padding:0}body{background:#000;overflow:hidden}
  canvas{display:block;image-rendering:pixelated}
  #start{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
  #start span{color:#999;font:13px monospace;opacity:.5}.gone{display:none!important}
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C=document.getElementById('c'),X=C.getContext('2d'),DUR=20,DS=3;
let T=0,on=false;
const OC=document.createElement('canvas'),OX=OC.getContext('2d',{willReadFrequently:true});
let ow,oh;
function sz(){C.width=innerWidth;C.height=innerHeight;ow=Math.floor(C.width/DS);oh=Math.floor(C.height/DS);OC.width=ow;OC.height=oh;initDrops()}
const PI=Math.PI,TWO_PI=PI*2;

const P=new Uint8Array(512);
(function(){const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}for(let i=0;i<512;i++)P[i]=p[i&255]})();
function fade(t){return t*t*t*(t*(t*6-15)+10)}function lerp(a,b,t){return a+t*(b-a)}
function grad(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y)}
function perlin(x,y){const xi=Math.floor(x)&255,yi=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf);return lerp(lerp(grad(P[P[xi]+yi],xf,yf),grad(P[P[xi+1]+yi],xf-1,yf),u),lerp(grad(P[P[xi]+yi+1],xf,yf-1),grad(P[P[xi+1]+yi+1],xf-1,yf-1),u),v)}
function fbm(x,y,o){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*perlin(x*f,y*f);a*=.5;f*=2.1}return v}

// Rain drops
const MAX_DROPS=300;let drops=[];
function initDrops(){drops=[];for(let i=0;i<MAX_DROPS;i++)drops.push({x:Math.random(),y:Math.random(),speed:.3+Math.random()*.7,len:.02+Math.random()*.06,bright:.3+Math.random()*.7,wind:0})}
initDrops();

// AUDIO — rain ambience with distant thunder
let AC,masterGain,bus,drones=[],noiseGain,noiseFilter,metalFilter,metalGain;
async function initAudio(){
  AC=new AudioContext();masterGain=AC.createGain();masterGain.gain.value=0;masterGain.connect(AC.destination);
  const rev=AC.createConvolver(),rL=AC.sampleRate*6,rB=AC.createBuffer(2,rL,AC.sampleRate);
  for(let ch=0;ch<2;ch++){const d=rB.getChannelData(ch);for(let i=0;i<rL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*2.5))*(.4+.6*Math.exp(-i/(AC.sampleRate*.8)))}
  rev.buffer=rB;
  const dG=AC.createGain(),wG=AC.createGain();dG.gain.value=.3;wG.gain.value=.7;
  const dist=AC.createWaveShaper(),cv=new Float32Array(1024);for(let i=0;i<1024;i++)cv[i]=Math.tanh(((i/512)-1)*1.5);dist.curve=cv;dist.oversample='2x';
  bus=AC.createGain();bus.gain.value=1;bus.connect(dist);dist.connect(dG);dist.connect(rev);rev.connect(wG);dG.connect(masterGain);wG.connect(masterGain);

  // Sub — very low rumble, like distant thunder
  const s=AC.createOscillator();s.type='sine';s.frequency.value=30;
  const sg=AC.createGain();sg.gain.value=.1;const sf=AC.createBiquadFilter();sf.type='lowpass';sf.frequency.value=40;sf.Q.value=2;
  s.connect(sf);sf.connect(sg);sg.connect(bus);s.start();drones.push({osc:s,gain:sg,filter:sf});

  // Rain noise — main texture, wide band
  const nB=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate),nd=nB.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;

  // Low rain
  const ns1=AC.createBufferSource();ns1.buffer=nB;ns1.loop=true;
  noiseFilter=AC.createBiquadFilter();noiseFilter.type='bandpass';noiseFilter.frequency.value=800;noiseFilter.Q.value=.3;
  noiseGain=AC.createGain();noiseGain.gain.value=.08;
  ns1.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(bus);ns1.start();

  // High patter
  const ns2=AC.createBufferSource();ns2.buffer=nB;ns2.loop=true;
  const hf=AC.createBiquadFilter();hf.type='highpass';hf.frequency.value=3000;hf.Q.value=.3;
  const hg=AC.createGain();hg.gain.value=.04;
  ns2.connect(hf);hf.connect(hg);hg.connect(bus);ns2.start();

  // Thunder resonance — low bandpass
  const ms=AC.createBufferSource();ms.buffer=nB;ms.loop=true;
  metalFilter=AC.createBiquadFilter();metalFilter.type='bandpass';metalFilter.frequency.value=60;metalFilter.Q.value=8;
  metalGain=AC.createGain();metalGain.gain.value=0;
  ms.connect(metalFilter);metalFilter.connect(metalGain);metalGain.connect(bus);ms.start();

  // Drip resonance
  const ds=AC.createBufferSource();ds.buffer=nB;ds.loop=true;
  const df=AC.createBiquadFilter();df.type='bandpass';df.frequency.value=2500;df.Q.value=60;
  const dg=AC.createGain();dg.gain.value=.003;
  ds.connect(df);df.connect(dg);dg.connect(bus);ds.start();

  const l1=AC.createOscillator();l1.type='sine';l1.frequency.value=2/DUR;const l1g=AC.createGain();l1g.gain.value=200;l1.connect(l1g);l1g.connect(noiseFilter.frequency);l1.start();
  const l2=AC.createOscillator();l2.type='sine';l2.frequency.value=3/DUR;const l2g=AC.createGain();l2g.gain.value=800;l2.connect(l2g);l2g.connect(df.frequency);l2.start();

  masterGain.gain.setTargetAtTime(.4,AC.currentTime,1.5);
}
function updateAudio(t,dis,env){
  if(!AC)return;const now=AC.currentTime;
  const breath=.5+.5*Math.sin(t/DUR*TWO_PI*2);
  if(noiseGain)noiseGain.gain.setTargetAtTime(.06+breath*.04+dis*.04,now,.15);
  // Thunder on disruption
  if(metalGain)metalGain.gain.setTargetAtTime(dis>.3?dis*.12:0,now,.02);
  if(drones[0])drones[0].gain.gain.setTargetAtTime(.05+dis*.15,now,.03);
  if(masterGain)masterGain.gain.setTargetAtTime(.35*env+.03,now,.15);
}

// VISUALS
const B8=[0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);

// Single distant thunder flash
function disruption(t){const p=t/DUR;let d=0;for(const b of[.4]){let dist=Math.abs(p-b);dist=Math.min(dist,1-dist);d+=Math.exp(-dist*DUR*3)*1.5}return d}
function envelope(t){const p=t/DUR;if(p<.05)return p/.05;if(p>.95)return(1-p)/.05;return 1}

function renderScene(t){
  const phase=t/DUR,env=envelope(t),dis=disruption(t),p=phase*TWO_PI;
  const img=OX.createImageData(ow,oh),d=img.data;
  const dt=1/60;

  // Wind sway
  const wind=Math.sin(p)*0.02+Math.sin(p*3)*.008;

  // Update drops
  for(let i=0;i<MAX_DROPS;i++){
    const dr=drops[i];
    dr.y+=dr.speed*dt*3;
    dr.x+=wind;
    dr.wind=wind;
    if(dr.y>1.1){dr.y=-dr.len;dr.x=Math.random()}
    if(dr.x<-.05)dr.x+=1.1;if(dr.x>1.05)dr.x-=1.1;
  }

  for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){
    const nx=x/ow,ny=y/oh;let brightness=0;

    // Background fog/clouds — very subtle
    const fog=fbm(nx*3+t*.003,ny*2+t*.002,4);
    brightness+=Math.max(0,fog*.06+.02);

    // Distant city/ground glow at bottom
    if(ny>.85){
      const groundGlow=(ny-.85)/.15;
      const gNoise=fbm(nx*8,ny*2+t*.005,3);
      brightness+=groundGlow*.15*(1+gNoise*.5);
      // Window lights
      const winNoise=perlin(nx*60,ny*30);
      if(winNoise>.4&&ny>.9)brightness+=.3*(winNoise-.4)*3;
    }

    // Lightning flash
    if(dis>.3){
      const flashBright=dis*.4;
      const cloudShape=fbm(nx*2,ny*3,4);
      brightness+=flashBright*Math.max(0,cloudShape+.3)*(1-ny*.5);
    }

    // Rain streaks
    for(let i=0;i<MAX_DROPS;i++){
      const dr=drops[i];
      const dx=Math.abs(nx-dr.x);
      if(dx<.003){
        const topY=dr.y-dr.len;
        if(ny>=topY&&ny<=dr.y){
          const along=(ny-topY)/dr.len;
          brightness+=dr.bright*.5*(1-dx/.003)*(.5+along*.5);
        }
      }
    }

    // Splash circles at bottom
    for(let i=0;i<MAX_DROPS;i++){
      const dr=drops[i];
      if(dr.y>.95&&dr.y<1.05){
        const splashPhase=(dr.y-.95)/.1;
        const sdx=nx-dr.x,sdy=(ny-.95);
        const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
        const ring=Math.abs(sdist-splashPhase*.03);
        if(ring<.004)brightness+=.3*(1-splashPhase);
      }
    }

    // Vignette
    const vx=(nx-.5)*2,vy=(ny-.5)*2;brightness*=Math.max(0,1-(vx*vx+vy*vy)*.2);
    brightness=Math.max(0,Math.min(1,brightness*env));
    const idx=(y*ow+x)*4,v=Math.floor(brightness*255);
    d[idx]=d[idx+1]=d[idx+2]=v;d[idx+3]=255;
  }
  OX.putImageData(img,0,0);applyDither(t,dis);
  X.imageSmoothingEnabled=false;X.drawImage(OC,0,0,ow,oh,0,0,C.width,C.height);updateAudio(t,dis,env);
}

function applyDither(time,dis){const img=OX.getImageData(0,0,ow,oh),d=img.data,ph=Math.floor(time*2)%8;
for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){const i=(y*ow+x)*4,br=d[i]/255,tx=(x+ph)%8,ty=(y+ph)%8;let th=B8[ty*8+tx];if(dis>.5&&(y+Math.floor(time*5))%12<dis*2)th=1-th;d[i]=d[i+1]=d[i+2]=br>th?255:0;d[i+3]=255}OX.putImageData(img,0,0)}

sz();addEventListener('resize',sz);
let last=0;function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now(),dt=Math.min((now-last)/1000,.05);last=now;T+=dt;if(T>=DUR)T-=DUR;renderScene(T)}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script></body></html>
