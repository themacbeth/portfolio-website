<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drone — Pendulum</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #a00; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 20;
const DS = 6;
let T = 0, on = false;

const OC = document.createElement('canvas');
const OX = OC.getContext('2d', { willReadFrequently: true });
let ow, oh;

function sz() {
  C.width = innerWidth; C.height = innerHeight;
  ow = Math.floor(C.width / DS);
  oh = Math.floor(C.height / DS);
  OC.width = ow; OC.height = oh;
}
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO_PI = PI * 2;

// ═══════════════════════════════════════════════
// AUDIO — subterranean pendulum drone
// Root: F#0 + B0 (23.12Hz + 30.87Hz) — deep, grinding
// ═══════════════════════════════════════════════
let AC, masterGain, bus;
let drones = [], noiseGain, noiseFilter, metalFilter, metalGain;

async function initAudio() {
  AC = new AudioContext();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(AC.destination);

  const reverbNode = AC.createConvolver();
  const revLen = AC.sampleRate * 8;
  const revBuf = AC.createBuffer(2, revLen, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) {
      data[i] = (Math.random()*2-1) * Math.exp(-i/(AC.sampleRate*3.5)) * (0.3+0.7*Math.exp(-i/(AC.sampleRate*0.6)));
    }
  }
  reverbNode.buffer = revBuf;

  const dryG = AC.createGain(); dryG.gain.value = 0.28;
  const wetG = AC.createGain(); wetG.gain.value = 0.72;
  const distNode = AC.createWaveShaper();
  const curve = new Float32Array(1024);
  for (let i = 0; i < 1024; i++) curve[i] = Math.tanh(((i/512)-1)*3.5);
  distNode.curve = curve; distNode.oversample = '2x';

  bus = AC.createGain(); bus.gain.value = 1;
  bus.connect(distNode); distNode.connect(dryG); distNode.connect(reverbNode);
  reverbNode.connect(wetG); dryG.connect(masterGain); wetG.connect(masterGain);

  // Sub — F#0 + B0 sawtooth, heavy grinding fundamentals
  [23.12, 23.18, 30.87].forEach(freq => {
    const osc = AC.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = 0.07;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 65; lp.Q.value = 6;
    osc.connect(lp); lp.connect(g); g.connect(bus); osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });

  // Mid — F#1 + B1 + D#2 (minor cluster, tension)
  [46.25, 61.74, 77.78].forEach(freq => {
    const osc = AC.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = 0.025;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 160; lp.Q.value = 4;
    osc.connect(lp); lp.connect(g); g.connect(bus); osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });

  // Ghost — B4 (high metallic shimmer)
  const go = AC.createOscillator(); go.type = 'sine'; go.frequency.value = 987;
  const gg = AC.createGain(); gg.gain.value = 0.004;
  const gf = AC.createBiquadFilter(); gf.type = 'bandpass'; gf.frequency.value = 987; gf.Q.value = 20;
  go.connect(gf); gf.connect(gg); gg.connect(bus); go.start();
  drones.push({ osc: go, gain: gg, filter: gf });

  // Noise
  const nBuf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
  const ns = AC.createBufferSource(); ns.buffer = nBuf; ns.loop = true;
  noiseFilter = AC.createBiquadFilter(); noiseFilter.type='bandpass'; noiseFilter.frequency.value=350; noiseFilter.Q.value=0.6;
  noiseGain = AC.createGain(); noiseGain.gain.value = 0.025;
  ns.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(bus); ns.start();

  // Metal resonance
  const ms = AC.createBufferSource(); ms.buffer = nBuf; ms.loop = true;
  metalFilter = AC.createBiquadFilter(); metalFilter.type='bandpass'; metalFilter.frequency.value=2200; metalFilter.Q.value=50;
  metalGain = AC.createGain(); metalGain.gain.value = 0.005;
  ms.connect(metalFilter); metalFilter.connect(metalGain); metalGain.connect(bus); ms.start();

  const m2s = AC.createBufferSource(); m2s.buffer = nBuf; m2s.loop = true;
  const m2f = AC.createBiquadFilter(); m2f.type='bandpass'; m2f.frequency.value=720; m2f.Q.value=45;
  const m2g = AC.createGain(); m2g.gain.value = 0.005;
  m2s.connect(m2f); m2f.connect(m2g); m2g.connect(bus); m2s.start();

  // LFOs at 1/DUR for perfect loop sync
  const l1 = AC.createOscillator(); l1.type='sine'; l1.frequency.value=1/DUR;
  const l1g = AC.createGain(); l1g.gain.value=100;
  l1.connect(l1g); l1g.connect(noiseFilter.frequency); l1.start();
  const l2 = AC.createOscillator(); l2.type='sine'; l2.frequency.value=1/DUR;
  const l2g = AC.createGain(); l2g.gain.value=550;
  l2.connect(l2g); l2g.connect(metalFilter.frequency); l2g.connect(m2f.frequency); l2.start();

  masterGain.gain.setTargetAtTime(0.35, AC.currentTime, 1.5);
}

function updateAudio(t, dis, env) {
  if (!AC) return;
  const now = AC.currentTime;
  if (noiseGain) noiseGain.gain.setTargetAtTime(0.02+dis*0.16, now, 0.03);
  if (metalGain) metalGain.gain.setTargetAtTime(0.003+dis*0.05, now, 0.015);
  // Sub sawtooth opens on disruption hits
  for (let i=0;i<3;i++) if(drones[i]&&drones[i].filter) drones[i].filter.frequency.setTargetAtTime(55+dis*220,now,0.03);
  // Mid cluster swells dramatically
  for (let i=3;i<6;i++) if(drones[i]&&drones[i].filter) drones[i].filter.frequency.setTargetAtTime(140+dis*380,now,0.03);
  if (drones[6]) drones[6].gain.gain.setTargetAtTime(0.003+dis*0.014,now,0.04);
  if (masterGain) masterGain.gain.setTargetAtTime(0.32*env+0.03,now,0.12);
}

// ═══════════════════════════════════════════════
// VISUALS — Double pendulum trace
// Sinusoidal parameter modulation on lengths/masses/gravity
// completes one full cycle in DUR for perfect loop
// ═══════════════════════════════════════════════
const B8 = [0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);
const rX = (v,a) => { const c=Math.cos(a),s=Math.sin(a); return [v[0],v[1]*c-v[2]*s,v[1]*s+v[2]*c]; };
const rY = (v,a) => { const c=Math.cos(a),s=Math.sin(a); return [v[0]*c+v[2]*s,v[1],-v[0]*s+v[2]*c]; };

// Trail buffer for tip path
const TRAIL_LEN = 600;
const trail = [];
for (let i = 0; i < TRAIL_LEN; i++) trail.push({x:0,y:0,z:0});
let trailHead = 0;

// Double pendulum state — recomputed from deterministic initial conditions each frame
// to ensure perfect looping, we simulate from t=0 each render using the looped params
// But that's expensive, so instead: run a fixed simulation with slowly morphing params

// Persistent pendulum state
let th1 = PI * 0.8, th2 = PI * 0.6, w1 = 0, w2 = 0;
let prevPhase = -1;

function resetPendulum() {
  th1 = PI * 0.8; th2 = PI * 0.6; w1 = 0; w2 = 0;
  trailHead = 0;
  for (let i = 0; i < TRAIL_LEN; i++) trail[i] = {x:0,y:0,z:0};
  prevPhase = -1;
}

function stepPendulum(dt, L1, L2, m1, m2, g) {
  // Standard double pendulum equations of motion
  const dth = th1 - th2;
  const sin_dth = Math.sin(dth), cos_dth = Math.cos(dth);
  const M = m1 + m2;

  const den1 = M * L1 - m2 * L1 * cos_dth * cos_dth;
  const a1 = (m2 * L1 * w1 * w1 * sin_dth * cos_dth
            + m2 * g * Math.sin(th2) * cos_dth
            + m2 * L2 * w2 * w2 * sin_dth
            - M * g * Math.sin(th1)) / den1;

  const den2 = (L2 / L1) * den1;
  const a2 = (-m2 * L2 * w2 * w2 * sin_dth * cos_dth
            + M * (g * Math.sin(th1) * cos_dth
            - L1 * w1 * w1 * sin_dth
            - g * Math.sin(th2))) / den2;

  w1 += a1 * dt;
  w2 += a2 * dt;
  // Light damping to prevent blowup, slight enough to keep chaos
  w1 *= 0.9998;
  w2 *= 0.9998;
  th1 += w1 * dt;
  th2 += w2 * dt;
}

// 4 beat pulses per loop — asymmetric, menacing rhythm
function disruption(t) {
  const phase = t / DUR; let d = 0;
  for (const b of [0.0, 0.25, 0.55, 0.82]) {
    let dist = Math.abs(phase - b);
    dist = Math.min(dist, 1 - dist);
    d += Math.exp(-dist * DUR * 6);
  }
  return d;
}
function envelope(t) { const p=t/DUR; if(p<0.1)return p/0.1; if(p>0.9)return(1-p)/0.1; return 1; }

function addGlow() {
  const img=OX.getImageData(0,0,ow,oh); const d=img.data;
  const src=new Uint8Array(ow*oh); for(let i=0;i<src.length;i++)src[i]=d[i*4];
  for(let y=1;y<oh-1;y++)for(let x=1;x<ow-1;x++){const i=y*ow+x;const avg=(src[i-ow-1]+src[i-ow]+src[i-ow+1]+src[i-1]+src[i]+src[i+1]+src[i+ow-1]+src[i+ow]+src[i+ow+1])/9;const idx=i*4;d[idx]=d[idx+1]=d[idx+2]=Math.min(255,src[i]+(avg*0.6)|0);}
  OX.putImageData(img,0,0);
}
function applyDither(time,dis) {
  const img=OX.getImageData(0,0,ow,oh);const d=img.data;const ph=Math.floor(time*3)%8;
  for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){const i=(y*ow+x)*4;const br=d[i]/255;const tx=(x+ph)%8;const ty=(y+ph)%8;let th=B8[ty*8+tx];if(dis>0.3&&(y+Math.floor(time*13))%6<dis*1.8)th=1-th;const on=br>th;d[i]=on?180:0;d[i+1]=on?12:0;d[i+2]=on?8:0;d[i+3]=255;}
  OX.putImageData(img,0,0);
}

function render(t) {
  const phase=t/DUR, env=envelope(t), dis=disruption(t);

  // Reset pendulum at loop boundary for perfect loop
  if (prevPhase > 0.95 && phase < 0.05) resetPendulum();
  prevPhase = phase;

  // Sinusoidal parameter modulation — full cycle in DUR
  const cyc = phase * TWO_PI;
  const L1 = 1.0 + 0.15 * Math.sin(cyc);
  const L2 = 0.8 + 0.12 * Math.sin(cyc * 2 + 1.2);
  const m1 = 1.0 + 0.2 * Math.sin(cyc + 0.7);
  const m2 = 0.8 + 0.15 * Math.sin(cyc * 3 + 2.1);
  const g = 9.81 + 1.5 * Math.sin(cyc);

  // Substeps for stability
  const substeps = 12;
  const subdt = 0.016 / substeps;
  for (let s = 0; s < substeps; s++) {
    stepPendulum(subdt, L1, L2, m1, m2, g);
  }

  // Tip position
  const tipX = L1 * Math.sin(th1) + L2 * Math.sin(th2);
  const tipY = L1 * Math.cos(th1) + L2 * Math.cos(th2);
  // Add z-depth from parameter phase for 3D feel
  const tipZ = 0.3 * Math.sin(cyc * 2 + th1 * 0.5);

  trail[trailHead] = {x: tipX, y: tipY, z: tipZ};
  trailHead = (trailHead + 1) % TRAIL_LEN;

  OX.fillStyle='#000'; OX.fillRect(0,0,ow,oh);

  const scatterAmt = dis * 2.5;
  const rotYa = phase * TWO_PI * 0.5;
  const rotXa = 0.35 + Math.sin(cyc) * 0.15;
  const scale = Math.min(ow, oh) * 0.22;
  const cx = ow / 2, cy = oh / 2;

  // Draw the trail — older segments fade
  const visCount = Math.max(2, Math.floor(env * TRAIL_LEN));
  OX.beginPath();
  let started = false;

  for (let i = 0; i < visCount; i++) {
    const idx = (trailHead - visCount + i + TRAIL_LEN) % TRAIL_LEN;
    let px = trail[idx].x, py = trail[idx].y, pz = trail[idx].z;

    if (scatterAmt > 0.1) {
      const mag = Math.sqrt(px*px + py*py + pz*pz) || 1;
      px += (px/mag) * scatterAmt * 0.08 + Math.sin(i*4.3+t*20) * scatterAmt * 0.04;
      py += (py/mag) * scatterAmt * 0.08 + Math.sin(i*7.1+t*20) * scatterAmt * 0.04;
      pz += Math.sin(i*2.9+t*15) * scatterAmt * 0.03;
    }

    let v = [px, py, pz];
    v = rX(v, rotXa);
    v = rY(v, rotYa);

    const sx = v[0] * scale + cx;
    const sy = v[1] * scale + cy;

    if (!started) { OX.moveTo(sx, sy); started = true; }
    else OX.lineTo(sx, sy);
  }

  // Brightness driven by age and envelope
  const alpha = (0.2 + env * 0.4).toFixed(2);
  OX.strokeStyle = `rgba(255,255,255,${alpha})`;
  OX.lineWidth = 0.5;
  OX.stroke();

  // Draw a second, thinner pass for the most recent segment (hot tip)
  const hotLen = Math.min(40, visCount);
  if (hotLen > 2) {
    OX.beginPath();
    let hs = false;
    for (let i = visCount - hotLen; i < visCount; i++) {
      const idx = (trailHead - visCount + i + TRAIL_LEN) % TRAIL_LEN;
      let px = trail[idx].x, py = trail[idx].y, pz = trail[idx].z;
      let v = [px, py, pz];
      v = rX(v, rotXa); v = rY(v, rotYa);
      const sx = v[0] * scale + cx, sy = v[1] * scale + cy;
      if (!hs) { OX.moveTo(sx, sy); hs = true; } else OX.lineTo(sx, sy);
    }
    OX.strokeStyle = `rgba(255,255,255,${(0.4+env*0.5).toFixed(2)})`;
    OX.lineWidth = 1.0;
    OX.stroke();
  }

  addGlow(); applyDither(t, dis);
  X.imageSmoothingEnabled = false;
  X.drawImage(OC, 0, 0, ow, oh, 0, 0, C.width, C.height);
  updateAudio(t, dis, env);
}

let last=0;
function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now();const d=Math.min((now-last)/1000,0.05);last=now;T+=d;if(T>=DUR)T-=DUR;render(T);}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script>
</body>
</html>
