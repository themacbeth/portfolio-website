<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dither Scene — Vortex</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #999; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 20;
const DS = 3;
let T = 0, on = false;

const OC = document.createElement('canvas');
const OX = OC.getContext('2d', { willReadFrequently: true });
let ow, oh;

function sz() {
  C.width = innerWidth; C.height = innerHeight;
  ow = Math.floor(C.width / DS);
  oh = Math.floor(C.height / DS);
  OC.width = ow; OC.height = oh;
}
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO_PI = PI * 2;

// Noise
const P = new Uint8Array(512);
(function(){const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
for(let i=0;i<512;i++)P[i]=p[i&255];})();
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}
function grad(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y);}
function perlin(x,y){
  const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=fade(xf),v=fade(yf);
  return lerp(lerp(grad(P[P[xi]+yi],xf,yf),grad(P[P[xi+1]+yi],xf-1,yf),u),
    lerp(grad(P[P[xi]+yi+1],xf,yf-1),grad(P[P[xi+1]+yi+1],xf-1,yf-1),u),v);
}
function fbm(x,y,oct){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=a*perlin(x*f,y*f);a*=.5;f*=2.1;}return v;}

// ═══════════════════════════════════════════════
// AUDIO — spinning void drone
// ═══════════════════════════════════════════════
let AC, masterGain, bus, drones=[], noiseGain, noiseFilter, metalFilter, metalGain;

async function initAudio() {
  AC = new AudioContext();
  masterGain = AC.createGain(); masterGain.gain.value = 0; masterGain.connect(AC.destination);

  const rev = AC.createConvolver();
  const rL = AC.sampleRate * 8;
  const rB = AC.createBuffer(2, rL, AC.sampleRate);
  for(let ch=0;ch<2;ch++){const d=rB.getChannelData(ch);for(let i=0;i<rL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*3))*(.3+.7*Math.exp(-i/(AC.sampleRate*.9)));}
  rev.buffer=rB;

  const dryG=AC.createGain();dryG.gain.value=.25;
  const wetG=AC.createGain();wetG.gain.value=.75;
  const dist=AC.createWaveShaper();const cv=new Float32Array(1024);
  for(let i=0;i<1024;i++)cv[i]=Math.tanh(((i/512)-1)*2.2);dist.curve=cv;dist.oversample='2x';
  bus=AC.createGain();bus.gain.value=1;
  bus.connect(dist);dist.connect(dryG);dist.connect(rev);rev.connect(wetG);dryG.connect(masterGain);wetG.connect(masterGain);

  // Sub — E1+Bb1 tritone
  [41.2, 41.3, 58.27].forEach(f=>{
    const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=f;
    const g=AC.createGain();g.gain.value=.08;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=70;lp.Q.value=4;
    o.connect(lp);lp.connect(g);g.connect(bus);o.start();
    drones.push({osc:o,gain:g,filter:lp});
  });

  // Mid — diminished cluster E2+G2+Bb2
  [82.41, 98.0, 116.54].forEach(f=>{
    const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=f;
    const g=AC.createGain();g.gain.value=.02;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200;lp.Q.value=2;
    o.connect(lp);lp.connect(g);g.connect(bus);o.start();
    drones.push({osc:o,gain:g,filter:lp});
  });

  // Ghost — Db5
  const go=AC.createOscillator();go.type='sine';go.frequency.value=554;
  const gg=AC.createGain();gg.gain.value=.006;
  const gf=AC.createBiquadFilter();gf.type='bandpass';gf.frequency.value=554;gf.Q.value=15;
  go.connect(gf);gf.connect(gg);gg.connect(bus);go.start();
  drones.push({osc:go,gain:gg,filter:gf});

  // Noise — swirling wind
  const nB=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate);
  const nd=nB.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=AC.createBufferSource();ns.buffer=nB;ns.loop=true;
  noiseFilter=AC.createBiquadFilter();noiseFilter.type='bandpass';noiseFilter.frequency.value=600;noiseFilter.Q.value=.5;
  noiseGain=AC.createGain();noiseGain.gain.value=.05;
  ns.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(bus);ns.start();

  // Metal resonance
  const ms=AC.createBufferSource();ms.buffer=nB;ms.loop=true;
  metalFilter=AC.createBiquadFilter();metalFilter.type='bandpass';metalFilter.frequency.value=1200;metalFilter.Q.value=45;
  metalGain=AC.createGain();metalGain.gain.value=.006;
  ms.connect(metalFilter);metalFilter.connect(metalGain);metalGain.connect(bus);ms.start();

  const l1=AC.createOscillator();l1.type='sine';l1.frequency.value=1/DUR;
  const l1g=AC.createGain();l1g.gain.value=200;l1.connect(l1g);l1g.connect(noiseFilter.frequency);l1.start();
  const l2=AC.createOscillator();l2.type='sine';l2.frequency.value=2/DUR;
  const l2g=AC.createGain();l2g.gain.value=400;l2.connect(l2g);l2g.connect(metalFilter.frequency);l2.start();

  masterGain.gain.setTargetAtTime(.35,AC.currentTime,1.5);
}

function updateAudio(t,dis,env){
  if(!AC)return;const now=AC.currentTime;
  if(noiseGain)noiseGain.gain.setTargetAtTime(.04+dis*.1,now,.05);
  if(metalGain)metalGain.gain.setTargetAtTime(.004+dis*.03,now,.03);
  for(let i=0;i<3;i++)if(drones[i]&&drones[i].filter)drones[i].filter.frequency.setTargetAtTime(65+dis*200,now,.04);
  for(let i=3;i<6;i++)if(drones[i]&&drones[i].filter)drones[i].filter.frequency.setTargetAtTime(180+dis*350,now,.04);
  if(drones[6])drones[6].gain.gain.setTargetAtTime(.004+dis*.015,now,.05);
  if(masterGain)masterGain.gain.setTargetAtTime(.32*env+.03,now,.15);
}

// ═══════════════════════════════════════════════
// VISUALS — swirling vortex with tendrils + debris
// Domain warping creates organic swirl structures
// ═══════════════════════════════════════════════
const B8=[0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(v=>v/64);

// 2 slow pulses — asymmetric
function disruption(t) {
  const ph=t/DUR;let d=0;
  for(const b of[.15,.65]){let dist=Math.abs(ph-b);dist=Math.min(dist,1-dist);d+=Math.exp(-dist*DUR*4);}
  return d;
}
function envelope(t){const p=t/DUR;if(p<.08)return p/.08;if(p>.92)return(1-p)/.08;return 1;}

function renderScene(t) {
  const phase=t/DUR, env=envelope(t), dis=disruption(t);
  const p=phase*TWO_PI;

  const img = OX.createImageData(ow, oh);
  const d = img.data;

  // Vortex centers
  const v1x = .45 + .08*Math.sin(p);
  const v1y = .4 + .06*Math.cos(p*.7);
  const v2x = .6 + .1*Math.sin(p*1.3+2);
  const v2y = .55 + .08*Math.cos(p*0.9+1);

  for (let y=0;y<oh;y++) {
    for (let x=0;x<ow;x++) {
      const nx=x/ow, ny=y/oh;
      const aspect = ow/oh;

      // Domain warping — distort coordinates through noise
      const warp1x = fbm(nx*3+t*.01, ny*3, 4) * .4;
      const warp1y = fbm(nx*3+10, ny*3+t*.01, 4) * .4;
      const wx = nx + warp1x;
      const wy = ny + warp1y;

      // Second warp pass for more complexity
      const warp2x = fbm(wx*2+5+t*.015, wy*2+5, 3) * .25;
      const warp2y = fbm(wx*2+15, wy*2+15+t*.012, 3) * .25;
      const wx2 = wx + warp2x;
      const wy2 = wy + warp2y;

      // Swirl around vortex centers
      let brightness = 0;

      for (let vi=0;vi<2;vi++) {
        const vx = vi===0?v1x:v2x, vy = vi===0?v1y:v2y;
        const dx = wx2-vx, dy = (wy2-vy)*aspect;
        const dist = Math.sqrt(dx*dx+dy*dy);
        const angle = Math.atan2(dy, dx);

        // Spiral arms
        const spiralAngle = angle + dist*8 - p*(vi===0?1:-0.7);
        const spiral = Math.sin(spiralAngle*3) * .5 + .5;
        const armBright = spiral * Math.exp(-dist*3) * .8;

        // Core glow
        const core = Math.exp(-dist*dist*80) * .9;

        // Outer ring
        const ring = Math.exp(-(dist-.15)*(dist-.15)*200) * .3;

        brightness += armBright + core + ring;
      }

      // Floating debris/organic particles
      const debris = fbm(wx2*12+t*.03, wy2*12-t*.02, 3);
      if (debris > .3) {
        brightness += (debris-.3)*1.5*.25;
      }

      // Filament structures — elongated noise
      const fil = fbm(wx2*6, wy2*1.5+t*.01, 5);
      if (fil > .25) {
        brightness += (fil-.25)*.3;
      }

      // Deep background murk
      const bg = fbm(nx*2+t*.005, ny*2, 4);
      brightness += Math.max(0, bg) * .08;

      // Vignette
      const vvx=(nx-.5)*2, vvy=(ny-.5)*2;
      brightness *= Math.max(0, 1-(vvx*vvx+vvy*vvy)*.25);

      brightness = Math.max(0, Math.min(1, brightness*env));

      const idx=(y*ow+x)*4;
      const v = Math.floor(brightness*255);
      d[idx]=d[idx+1]=d[idx+2]=v;d[idx+3]=255;
    }
  }

  OX.putImageData(img,0,0);
  applyDither(t,dis);
  X.imageSmoothingEnabled=false;
  X.drawImage(OC,0,0,ow,oh,0,0,C.width,C.height);
  updateAudio(t,dis,env);
}

function applyDither(time,dis){
  const img=OX.getImageData(0,0,ow,oh);const d=img.data;const ph=Math.floor(time*2)%8;
  for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){
    const i=(y*ow+x)*4;const br=d[i]/255;const tx=(x+ph)%8,ty=(y+ph)%8;
    let th=B8[ty*8+tx];
    if(dis>.2&&(y+Math.floor(time*9))%8<dis*2.5)th=1-th;
    d[i]=d[i+1]=d[i+2]=br>th?255:0;d[i+3]=255;
  }
  OX.putImageData(img,0,0);
}

let last=0;
function frame(){if(!on)return;requestAnimationFrame(frame);const now=performance.now();const dt=Math.min((now-last)/1000,.05);last=now;T+=dt;if(T>=DUR)T-=DUR;renderScene(T);}
// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script>
</body>
</html>
