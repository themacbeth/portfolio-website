<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drone — Orbit</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #a00; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB_MODE=new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 20;
const DS = 6;
let T = 0, on = false;

const OC = document.createElement('canvas');
const OX = OC.getContext('2d', { willReadFrequently: true });
let ow, oh;

// Density buffer for accumulated trail
let density;

function sz() {
  C.width = innerWidth; C.height = innerHeight;
  ow = Math.floor(C.width / DS);
  oh = Math.floor(C.height / DS);
  OC.width = ow; OC.height = oh;
  density = new Float32Array(ow * oh);
}
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO_PI = PI * 2;

// ═══════════════════════════════════════════════
// AUDIO — subterranean magnetic drone
// Root: Bb0 + Eb1 — heavy, dark, gravitational
// ═══════════════════════════════════════════════
let AC, masterGain, bus;
let drones = [], noiseGain, noiseFilter;
let metalFilter, metalGain;

async function initAudio() {
  AC = new AudioContext();

  masterGain = AC.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(AC.destination);

  // ── Dark reverb — 7 second tail ──
  const reverbNode = AC.createConvolver();
  const revLen = AC.sampleRate * 7;
  const revBuf = AC.createBuffer(2, revLen, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) {
      const noise = Math.random() * 2 - 1;
      const decay = Math.exp(-i / (AC.sampleRate * 3.0));
      const darkening = Math.exp(-i / (AC.sampleRate * 0.7));
      data[i] = noise * decay * (0.35 + 0.65 * darkening);
    }
  }
  reverbNode.buffer = revBuf;

  const dryGain = AC.createGain();
  dryGain.gain.value = 0.30;
  const wetGain = AC.createGain();
  wetGain.gain.value = 0.70;

  // ── Waveshaper distortion ──
  const distNode = AC.createWaveShaper();
  const curve = new Float32Array(1024);
  for (let i = 0; i < 1024; i++) {
    const x = (i / 512) - 1;
    curve[i] = Math.tanh(x * 2.8);
  }
  distNode.curve = curve;
  distNode.oversample = '2x';

  bus = AC.createGain();
  bus.gain.value = 1;
  bus.connect(distNode);
  distNode.connect(dryGain);
  distNode.connect(reverbNode);
  reverbNode.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(masterGain);

  // ── Sub rumble — Bb0 + Eb1 ──
  const subNotes = [
    { freq: 29.14, detune: 0.10 },
    { freq: 29.27, detune: 0 },
    { freq: 38.89, detune: 0.08 },
  ];
  subNotes.forEach(({ freq, detune }) => {
    const osc = AC.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq + detune;
    const g = AC.createGain();
    g.gain.value = 0.09;
    const lp = AC.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 80;
    lp.Q.value = 4;
    osc.connect(lp);
    lp.connect(g);
    g.connect(bus);
    osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });

  // ── Dark mid — minor cluster Bb1 + B1 ──
  const midNotes = [
    { freq: 58.27, detune: 0 },
    { freq: 61.74, detune: 0 },
  ];
  midNotes.forEach(({ freq, detune }) => {
    const osc = AC.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq + detune;
    const g = AC.createGain();
    g.gain.value = 0.035;
    const lp = AC.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 220;
    lp.Q.value = 2;
    osc.connect(lp);
    lp.connect(g);
    g.connect(bus);
    osc.start();
    drones.push({ osc, gain: g, filter: lp });
  });

  // ── Ghost tone — Eb4 ──
  const ghostOsc = AC.createOscillator();
  ghostOsc.type = 'sine';
  ghostOsc.frequency.value = 311;
  const ghostGain = AC.createGain();
  ghostGain.gain.value = 0.010;
  const ghostFilter = AC.createBiquadFilter();
  ghostFilter.type = 'bandpass';
  ghostFilter.frequency.value = 311;
  ghostFilter.Q.value = 10;
  ghostOsc.connect(ghostFilter);
  ghostFilter.connect(ghostGain);
  ghostGain.connect(bus);
  ghostOsc.start();
  drones.push({ osc: ghostOsc, gain: ghostGain, filter: ghostFilter });

  // ── Noise ──
  const noiseBuf = AC.createBuffer(1, AC.sampleRate * 2, AC.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

  const noiseSrc = AC.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  noiseSrc.loop = true;
  noiseFilter = AC.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 450;
  noiseFilter.Q.value = 0.5;
  noiseGain = AC.createGain();
  noiseGain.gain.value = 0.030;
  noiseSrc.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(bus);
  noiseSrc.start();

  // ── Metallic resonance ──
  const metalSrc = AC.createBufferSource();
  metalSrc.buffer = noiseBuf;
  metalSrc.loop = true;
  metalFilter = AC.createBiquadFilter();
  metalFilter.type = 'bandpass';
  metalFilter.frequency.value = 1600;
  metalFilter.Q.value = 40;
  metalGain = AC.createGain();
  metalGain.gain.value = 0.005;
  metalSrc.connect(metalFilter);
  metalFilter.connect(metalGain);
  metalGain.connect(bus);
  metalSrc.start();

  // ── Second metal ──
  const metal2Src = AC.createBufferSource();
  metal2Src.buffer = noiseBuf;
  metal2Src.loop = true;
  const metal2Filter = AC.createBiquadFilter();
  metal2Filter.type = 'bandpass';
  metal2Filter.frequency.value = 800;
  metal2Filter.Q.value = 30;
  const metal2Gain = AC.createGain();
  metal2Gain.gain.value = 0.007;
  metal2Src.connect(metal2Filter);
  metal2Filter.connect(metal2Gain);
  metal2Gain.connect(bus);
  metal2Src.start();

  // ── LFOs — 1/DUR Hz = perfect 20s loop ──
  const lfo1 = AC.createOscillator();
  lfo1.type = 'sine';
  lfo1.frequency.value = 1 / DUR;
  const lfo1G = AC.createGain();
  lfo1G.gain.value = 120;
  lfo1.connect(lfo1G);
  lfo1G.connect(noiseFilter.frequency);
  lfo1.start();

  const lfo2 = AC.createOscillator();
  lfo2.type = 'sine';
  lfo2.frequency.value = 1 / DUR;
  const lfo2G = AC.createGain();
  lfo2G.gain.value = 400;
  lfo2.connect(lfo2G);
  lfo2G.connect(metalFilter.frequency);
  lfo2G.connect(metal2Filter.frequency);
  lfo2.start();

  masterGain.gain.setTargetAtTime(0.35, AC.currentTime, 1.5);
}

function updateAudio(t, dis, env) {
  if (!AC) return;
  const now = AC.currentTime;

  if (noiseGain) noiseGain.gain.setTargetAtTime(0.025 + dis * 0.14, now, 0.04);
  if (metalGain) metalGain.gain.setTargetAtTime(0.004 + dis * 0.045, now, 0.02);

  for (let i = 0; i < 3; i++) {
    if (drones[i] && drones[i].filter)
      drones[i].filter.frequency.setTargetAtTime(70 + dis * 180, now, 0.04);
  }

  const midCutoff = 180 + Math.sin(t * 0.35) * 70 + dis * 300;
  for (let i = 3; i < 5; i++) {
    if (drones[i] && drones[i].filter)
      drones[i].filter.frequency.setTargetAtTime(midCutoff, now, 0.04);
  }

  if (drones[5]) drones[5].gain.gain.setTargetAtTime(0.007 + dis * 0.022, now, 0.05);
  if (masterGain) masterGain.gain.setTargetAtTime(0.32 * env + 0.03, now, 0.15);
}

// ═══════════════════════════════════════════════
// VISUALS — magnetic pendulum orbit trace
// 3 magnets in triangle, pendulum above, traces path
// ═══════════════════════════════════════════════
const B8 = [
  0,32,8,40,2,34,10,42,  48,16,56,24,50,18,58,26,
  12,44,4,36,14,46,6,38, 60,28,52,20,62,30,54,22,
  3,35,11,43,1,33,9,41,  51,19,59,27,49,17,57,25,
  15,47,7,39,13,45,5,37, 63,31,55,23,61,29,53,21
].map(v => v / 64);

// Magnet positions — equilateral triangle, centered
const MAG_RADIUS = 1.2;
const MAGNETS = [
  { x: 0, y: -MAG_RADIUS },
  { x: -MAG_RADIUS * 0.866, y: MAG_RADIUS * 0.5 },
  { x: MAG_RADIUS * 0.866, y: MAG_RADIUS * 0.5 },
];

// Many particles for dense coverage
const NUM_PARTICLES = 12;
let particles = [];
const FRICTION = 0.997;
const DT_SIM = 0.004;
const STEPS_PER_FRAME = 500;
const HEIGHT = 0.15;

function resetPendulum(phase) {
  particles = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const angle = (phase + i / NUM_PARTICLES) * TWO_PI;
    const r = 0.3 + (i % 4) * 0.25;
    particles.push({
      px: r * Math.cos(angle + i * 1.7),
      py: r * Math.sin(angle + i * 2.3),
      vx: (2.0 + i * 0.3) * Math.sin(angle * 2 + i * 0.8),
      vy: (2.0 + i * 0.3) * Math.cos(angle * 3 + i * 1.1),
    });
  }
}

function magnetStrength(magIdx, phase) {
  const p = phase * TWO_PI;
  const offsets = [0, TWO_PI / 3, 2 * TWO_PI / 3];
  return 1.5 + 0.8 * Math.sin(p + offsets[magIdx]);
}

function simStepParticle(pt, phase) {
  let ax = 0, ay = 0;
  for (let m = 0; m < 3; m++) {
    const str = magnetStrength(m, phase);
    const dx = MAGNETS[m].x - pt.px;
    const dy = MAGNETS[m].y - pt.py;
    const distSq = dx * dx + dy * dy + HEIGHT * HEIGHT;
    const dist = Math.sqrt(distSq);
    const force = str / (distSq * dist);
    ax += dx * force;
    ay += dy * force;
  }
  // Weak restoring force — allows wide orbits
  ax -= pt.px * 0.03;
  ay -= pt.py * 0.03;
  // Periodic perturbation for chaos
  const pert = Math.sin(phase * TWO_PI * 3) * 0.4;
  ax += pert * Math.cos(phase * TWO_PI * 7 + pt.py);
  ay += pert * Math.sin(phase * TWO_PI * 7 + pt.px);

  pt.vx = (pt.vx + ax * DT_SIM) * FRICTION;
  pt.vy = (pt.vy + ay * DT_SIM) * FRICTION;
  pt.px += pt.vx * DT_SIM;
  pt.py += pt.vy * DT_SIM;

  // Soft clamp
  const r = Math.sqrt(pt.px * pt.px + pt.py * pt.py);
  if (r > 2.5) {
    pt.px *= 2.5 / r;
    pt.py *= 2.5 / r;
    pt.vx *= -0.3;
    pt.vy *= -0.3;
  }
}

function disruption(t) {
  const phase = t / DUR;
  let d = 0;
  const beats = [0.0, 0.25, 0.5, 0.75];
  for (const b of beats) {
    let dist = Math.abs(phase - b);
    dist = Math.min(dist, 1 - dist);
    d += Math.exp(-dist * DUR * 5);
  }
  return d;
}

function envelope(t) {
  const p = t / DUR;
  if (p < 0.1) return p / 0.1;
  if (p > 0.9) return (1 - p) / 0.1;
  return 1;
}

function addGlow() {
  const img = OX.getImageData(0, 0, ow, oh);
  const d = img.data;
  const src = new Uint8Array(ow * oh);
  for (let i = 0; i < src.length; i++) src[i] = d[i * 4];
  for (let y = 1; y < oh - 1; y++) {
    for (let x = 1; x < ow - 1; x++) {
      const i = y * ow + x;
      const avg = (src[i-ow-1]+src[i-ow]+src[i-ow+1]+src[i-1]+src[i]+src[i+1]+src[i+ow-1]+src[i+ow]+src[i+ow+1]) / 9;
      const idx = i * 4;
      const v = Math.min(255, src[i] + (avg * 0.6) | 0);
      d[idx] = d[idx+1] = d[idx+2] = v;
    }
  }
  OX.putImageData(img, 0, 0);
}

function applyDither(time, dis) {
  const img = OX.getImageData(0, 0, ow, oh);
  const d = img.data;
  const phase = Math.floor(time * 3) % 8;
  for (let y = 0; y < oh; y++) {
    for (let x = 0; x < ow; x++) {
      const i = (y * ow + x) * 4;
      const brightness = d[i] / 255;
      const tx = (x + phase) % 8;
      const ty = (y + phase) % 8;
      let threshold = B8[ty * 8 + tx];
      if (dis > 0.3 && (y + Math.floor(time * 13)) % 6 < dis * 1.8) {
        threshold = 1 - threshold;
      }
      const on = brightness > threshold;
      d[i]   = on ? 180 : 0;
      d[i+1] = on ? 12 : 0;
      d[i+2] = on ? 8 : 0;
      d[i+3] = 255;
    }
  }
  OX.putImageData(img, 0, 0);
}

// Track previous T to detect loop reset
let prevT = 0;

function render(t) {
  const phase = t / DUR;
  const env = envelope(t);
  const dis = disruption(t);

  // Detect loop reset — reinitialize pendulum
  if (t < prevT) {
    resetPendulum(0);
    density.fill(0);
  }
  prevT = t;

  // Very slow decay — trails persist and build up
  for (let i = 0; i < density.length; i++) {
    density[i] *= 0.9995;
  }

  // 2D projection — fill canvas, centered
  const scale = Math.min(ow, oh) * 0.35;
  const cx = ow / 2, cy = oh / 2;

  // Run simulation — all particles accumulate into density
  for (let s = 0; s < STEPS_PER_FRAME; s++) {
    const simPhase = phase + (s / STEPS_PER_FRAME) * (1 / (DUR * 60));
    for (let p = 0; p < NUM_PARTICLES; p++) {
      const pt = particles[p];
      simStepParticle(pt, simPhase);

      const sx = Math.floor(pt.px * scale + cx);
      const sy = Math.floor(pt.py * scale + cy);
      if (sx >= 1 && sx < ow - 1 && sy >= 1 && sy < oh - 1) {
        const idx = sy * ow + sx;
        density[idx] += 0.3;
        density[idx - 1] += 0.1;
        density[idx + 1] += 0.1;
        density[idx - ow] += 0.1;
        density[idx + ow] += 0.1;
      }
    }
  }

  // Draw magnet positions as bright spots
  for (let m = 0; m < 3; m++) {
    const str = magnetStrength(m, phase);
    const mag = MAGNETS[m];
    const mx = Math.floor(mag.x * scale + cx);
    const my = Math.floor(mag.y * scale + cy);
    const radius = Math.floor(2 + str * 0.8);
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const ddx = mx + dx, ddy = my + dy;
        if (ddx >= 0 && ddx < ow && ddy >= 0 && ddy < oh) {
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist <= radius) {
            density[ddy * ow + ddx] += 0.8 * str * (1 - dist / (radius + 1));
          }
        }
      }
    }
  }

  // Render density — log normalization for better dynamic range
  OX.fillStyle = '#000';
  OX.fillRect(0, 0, ow, oh);

  let maxDen = 0;
  for (let i = 0; i < density.length; i++) {
    if (density[i] > maxDen) maxDen = density[i];
  }
  if (maxDen < 1) maxDen = 1;
  const logMax = Math.log(1 + maxDen);

  const img = OX.getImageData(0, 0, ow, oh);
  const d = img.data;
  for (let i = 0; i < density.length; i++) {
    const normalized = Math.log(1 + density[i]) / logMax;
    const brightness = Math.min(255, Math.floor(normalized * 255 * env));
    const idx = i * 4;
    d[idx] = d[idx + 1] = d[idx + 2] = brightness;
    d[idx + 3] = 255;
  }
  OX.putImageData(img, 0, 0);

  // Draw current particle positions as bright dots
  for (let p = 0; p < NUM_PARTICLES; p++) {
    const pt = particles[p];
    const sx = pt.px * scale + cx;
    const sy = pt.py * scale + cy;
    OX.fillStyle = `rgba(255,255,255,${(0.4 * env).toFixed(2)})`;
    OX.beginPath();
    OX.arc(sx, sy, 1, 0, TWO_PI);
    OX.fill();
  }

  addGlow();
  applyDither(t, dis);

  X.imageSmoothingEnabled = false;
  X.drawImage(OC, 0, 0, ow, oh, 0, 0, C.width, C.height);

  updateAudio(t, dis, env);
}

// Initialize pendulum at start
resetPendulum(0);

let last = 0;
function frame() {
  if (!on) return;
  requestAnimationFrame(frame);
  const now = performance.now();
  const d = Math.min((now - last) / 1000, 0.05);
  last = now;
  T += d;
  if (T >= DUR) T -= DUR;
  render(T);
}

// Auto-start: try immediately, fall back to click
async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if(!THUMB_MODE) await initAudio();
  on = true; last = performance.now();
  frame();
}
// If in iframe with allow="autoplay", AudioContext works without gesture
if (window.self !== window.top) {
  autoStart();
} else {
  // Standalone: try auto, show click overlay if audio blocked
  autoStart().catch(() => {
    document.getElementById('start').classList.remove('gone');
    document.getElementById('start').addEventListener('click', () => autoStart());
  });
}
</script>
</body>
</html>
