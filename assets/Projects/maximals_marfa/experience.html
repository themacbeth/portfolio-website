<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIMALS — MARFA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }

#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#overlay span {
  font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 4px;
  color: rgba(228,225,218,0.3); text-transform: uppercase;
}

#buttons {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 28px; z-index: 100;
}

.arc-btn {
  width: 76px; height: 76px; border-radius: 50%; border: none; cursor: pointer;
  position: relative; outline: none;
  box-shadow:
    0 4px 14px rgba(0,0,0,0.7),
    inset 0 -6px 14px rgba(0,0,0,0.4),
    inset 0 6px 14px rgba(255,255,255,0.12);
  transition: transform 0.08s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.arc-btn:active {
  transform: scale(0.90) translateY(3px);
}
.arc-btn::after {
  content: ''; position: absolute; top: 11%; left: 18%; width: 36%; height: 24%;
  border-radius: 50%; background: rgba(255,255,255,0.22);
  filter: blur(5px); pointer-events: none;
}
.arc-btn.flash { animation: btnFlash 0.3s ease-out; }
@keyframes btnFlash {
  0% { box-shadow: 0 0 40px var(--glow); transform: scale(1.12); }
  100% { box-shadow: 0 4px 14px rgba(0,0,0,0.7); transform: scale(1); }
}

#btn-color {
  background: radial-gradient(circle at 38% 33%, #fff 0%, #ccc 25%, #888 50%, #444 75%, #222 100%);
  --glow: rgba(255,255,255,0.4);
  border: 2px solid rgba(255,255,255,0.1);
}
#btn-glitch {
  background: radial-gradient(circle at 38% 33%, #ffe080, #dab03e 40%, #6b5820);
  --glow: rgba(218,176,62,0.5);
}
#btn-motion {
  background: radial-gradient(circle at 38% 33%, #ff4444, #cc0000 40%, #660000);
  --glow: rgba(255,50,50,0.5);
}

.btn-label {
  position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
  font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.3); pointer-events: none; white-space: nowrap;
  text-transform: uppercase;
}

#audio-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 100;
  background: none; border: 1px solid rgba(228,225,218,0.15); cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 2px;
  color: rgba(228,225,218,0.35); text-transform: uppercase;
  padding: 6px 14px;
}
#audio-toggle:hover { border-color: rgba(228,225,218,0.35); }
#audio-toggle.muted { color: rgba(228,225,218,0.12); border-color: rgba(228,225,218,0.06); }

@media (max-width: 600px) {
  .arc-btn { width: 62px; height: 62px; }
  #buttons { gap: 18px; bottom: 30px; }
}
</style>
</head>
<body>

<div id="overlay" onclick="initExperience()"><span>tap to witness</span></div>
<button id="audio-toggle" onclick="toggleAudio()">AUDIO ON</button>

<div id="buttons">
  <button class="arc-btn" id="btn-color" onclick="cycleColor()">
    <span class="btn-label">COLOR</span>
  </button>
  <button class="arc-btn" id="btn-glitch" onclick="cycleGlyph()">
    <span class="btn-label">GLYPH</span>
  </button>
  <button class="arc-btn" id="btn-motion" onclick="cycleMotion()">
    <span class="btn-label">MOTION</span>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// MAXIMALS — MARFA : SACRED SCRIPT
// Clean vector strokes on black. White + Gold.
// ═══════════════════════════════════════════════════════

const PI = Math.PI, TAU = PI * 2;

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.prepend(canvas);

let W, H, CX, CY, SC;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  SC = Math.min(W, H) * 0.28;
}
resize();
window.addEventListener('resize', resize);

let started = false;
let frame = 0;
const TOTAL_FRAMES = 9000;

let colorMode = 0; // 0=white, 1=gold, 2=both
let glyphIdx = 0;
let motionMode = 0;

const COLORS = {
  white: '#e4e1da',
  gold: '#dab03e',
  dim: 'rgba(228,225,218,0.08)',
  dimGold: 'rgba(218,176,62,0.08)',
};

// ═══════════════════════════════════════════════════════
// 25 SELECTED SYMBOLS
// Each = array of stroke polylines, normalized 0-1
// Special strings: 'circle:cx,cy,r' 'dot:cx,cy'
// ═══════════════════════════════════════════════════════

const GLYPHS = [
  { name:'CROSS-ARROW', s:[[[.5,.15],[.5,.85]],[[.2,.5],[.8,.5]],[[.5,.15],[.35,.28]],[[.5,.15],[.65,.28]]] },
  { name:'COMPASS', s:[[[.5,.1],[.5,.9]],[[.1,.5],[.9,.5]],[[.5,.1],[.4,.25]],[[.5,.1],[.6,.25]],[[.5,.9],[.4,.75]],[[.5,.9],[.6,.75]],[[.1,.5],[.25,.4]],[[.1,.5],[.25,.6]],[[.9,.5],[.75,.4]],[[.9,.5],[.75,.6]]] },
  { name:'DAGGER', s:[[[.5,.12],[.5,.88]],[[.3,.35],[.7,.35]],[[.42,.3],[.42,.12]],[[.58,.3],[.58,.12]]] },
  { name:'TRIDENT', s:[[[.5,.25],[.5,.88]],[[.3,.45],[.7,.45]],[[.5,.25],[.3,.12]],[[.5,.25],[.7,.12]],[[.5,.12],[.5,.25]]] },
  { name:'STAR-CROSS', s:[[[.5,.1],[.5,.9]],[[.1,.5],[.9,.5]],[[.2,.2],[.8,.8]],[[.8,.2],[.2,.8]]] },
  { name:'CHEVRON-STACK', s:[[[.2,.3],[.5,.15],[.8,.3]],[[.2,.5],[.5,.35],[.8,.5]],[[.2,.7],[.5,.55],[.8,.7]],[[.2,.9],[.5,.75],[.8,.9]]] },
  { name:'DOUBLE-STRIKE', s:[[[.5,.1],[.5,.9]],[[.6,.1],[.6,.9]],[[.2,.35],[.8,.35]],[[.2,.65],[.8,.65]]] },
  { name:'GLYPH-PSI', s:[[[.5,.15],[.5,.85]],[[.2,.25],[.2,.55],[.5,.65]],[[.8,.25],[.8,.55],[.5,.65]]] },
  { name:'GLYPH-XI', s:[[[.2,.2],[.8,.2]],[[.3,.5],[.7,.5]],[[.2,.8],[.8,.8]],[[.5,.2],[.5,.8]]] },
  { name:'GLYPH-PHI', s:[[[.5,.1],[.5,.9]],'circle:.5,.5,.25'] },
  { name:'GATE', s:[[[.2,.3],[.5,.3],[.5,.7],[.8,.7]],[[.5,.3],[.5,.15]],[[.5,.7],[.5,.85]],'dot:.2,.3','dot:.8,.7'] },
  { name:'BUS', s:[[[.15,.5],[.85,.5]],[[.3,.5],[.3,.2]],[[.5,.5],[.5,.2]],[[.7,.5],[.7,.2]],[[.3,.5],[.3,.8]],[[.5,.5],[.5,.8]],[[.7,.5],[.7,.8]],'dot:.3,.2','dot:.5,.2','dot:.7,.2','dot:.3,.8','dot:.5,.8','dot:.7,.8'] },
  { name:'ZIGZAG', s:[[[.15,.5],[.3,.2],[.45,.8],[.6,.2],[.75,.8],[.85,.5]]] },
  { name:'FORK', s:[[[.5,.85],[.5,.4],[.2,.15]],[[.5,.4],[.8,.15]],'dot:.5,.85','dot:.2,.15','dot:.8,.15'] },
  { name:'TRINITY', s:[[[.5,.12],[.15,.82],[.85,.82],[.5,.12]],'circle:.5,.55,.18'] },
  { name:'INFINITY-X', s:[[[.1,.5],[.35,.25],[.5,.5],[.65,.75],[.9,.5],[.65,.25],[.5,.5],[.35,.75],[.1,.5]],[[.5,.2],[.5,.8]]] },
  { name:'RUNE-01', s:[[[.3,.15],[.7,.15],[.5,.45],[.7,.85],[.3,.85],[.5,.45]]] },
  { name:'RUNE-02', s:[[[.5,.1],[.5,.9]],[[.2,.3],[.8,.3]],[[.2,.7],[.8,.7]],[[.2,.3],[.5,.5],[.2,.7]],[[.8,.3],[.5,.5],[.8,.7]]] },
  { name:'RUNE-03', s:[[[.25,.15],[.25,.85]],[[.25,.15],[.75,.5]],[[.25,.85],[.75,.5]],[[.75,.5],[.75,.2]],[[.75,.5],[.75,.8]]] },
  { name:'RUNE-04', s:[[[.2,.2],[.8,.2],[.8,.8],[.2,.8],[.2,.2]],[[.2,.2],[.8,.8]],[[.8,.2],[.2,.8]]] },
  { name:'RUNE-06', s:[[[.2,.5],[.5,.15],[.8,.5]],[[.2,.5],[.5,.85],[.8,.5]],[[.5,.15],[.5,.85]]] },
  { name:'RUNE-07', s:[[[.3,.1],[.3,.9]],[[.7,.1],[.7,.9]],[[.3,.3],[.7,.5]],[[.7,.5],[.3,.7]]] },
  { name:'RUNE-08', s:[[[.5,.1],[.2,.4],[.35,.8],[.65,.8],[.8,.4],[.5,.1]],[[.5,.1],[.5,.5]],[[.5,.5],[.35,.8]],[[.5,.5],[.65,.8]]] },
  { name:'RUNE-09', s:[[[.15,.5],[.85,.5]],[[.5,.15],[.5,.85]],[[.5,.15],[.15,.5]],[[.5,.15],[.85,.5]],[[.5,.85],[.15,.5]],[[.5,.85],[.85,.5]]] },
  { name:'RUNE-10', s:[[[.3,.15],[.5,.5],[.3,.85]],[[.7,.15],[.5,.5],[.7,.85]],[[.15,.4],[.85,.4]],[[.15,.6],[.85,.6]]] },
];

// ═══════════════════════════════════════════════════════
// GLYPH RENDERER — clean strokes, no effects
// ═══════════════════════════════════════════════════════

function drawGlyph(glyph, cx, cy, scale, drawOn, color, weight, rotation) {
  if (drawOn <= 0) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation || 0);

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = weight || 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let totalStrokes = glyph.s.length;

  for (let si = 0; si < totalStrokes; si++) {
    // Staggered draw-on: each stroke has its own window
    let strokeStart = si / totalStrokes;
    let strokeEnd = (si + 1.5) / totalStrokes; // overlap windows for fluid feel
    let strokeDrawOn;
    if (drawOn <= strokeStart) strokeDrawOn = 0;
    else if (drawOn >= strokeEnd) strokeDrawOn = 1;
    else strokeDrawOn = (drawOn - strokeStart) / (strokeEnd - strokeStart);

    // Ease each individual stroke
    strokeDrawOn = strokeDrawOn * strokeDrawOn * (3 - 2 * strokeDrawOn); // smoothstep

    if (strokeDrawOn <= 0) continue;

    let stroke = glyph.s[si];

    if (typeof stroke === 'string') {
      if (strokeDrawOn < 0.5) continue;
      let parts = stroke.split(':');
      let args = parts[1].split(',').map(Number);
      if (parts[0] === 'circle') {
        let endAngle = TAU * Math.min(1, strokeDrawOn);
        ctx.beginPath();
        ctx.arc((args[0] - 0.5) * scale, (args[1] - 0.5) * scale, args[2] * scale, 0, endAngle);
        ctx.stroke();
      } else if (parts[0] === 'dot') {
        ctx.beginPath();
        ctx.arc((args[0] - 0.5) * scale, (args[1] - 0.5) * scale, weight * 1.5, 0, TAU);
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      for (let i = 0; i < stroke.length; i++) {
        let progress = i / (stroke.length - 1);
        if (progress > strokeDrawOn) break;
        let x = (stroke[i][0] - 0.5) * scale;
        let y = (stroke[i][1] - 0.5) * scale;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// RING SYSTEM — concentric circles with tick marks
// ═══════════════════════════════════════════════════════

function drawRingSystem(cx, cy, rings, col, weight, rotation) {
  ctx.strokeStyle = col;
  ctx.lineWidth = weight;
  ctx.lineCap = 'round';

  for (let ring of rings) {
    // Arc
    ctx.beginPath();
    ctx.arc(cx, cy, ring.r, ring.startA + rotation, ring.endA + rotation);
    ctx.stroke();

    // Ticks
    if (ring.ticks) {
      for (let t = 0; t < ring.ticks; t++) {
        let a = (t / ring.ticks) * TAU + rotation;
        let inner = ring.r - ring.tickLen;
        let outer = ring.r + ring.tickLen;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
        ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
        ctx.stroke();
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// SATELLITE GLYPHS — smaller symbols orbiting the center
// ═══════════════════════════════════════════════════════

let satellites = [];
function initSatellites() {
  satellites = [];
  for (let i = 0; i < 6; i++) {
    satellites.push({
      glyphIdx: Math.floor(Math.random() * GLYPHS.length),
      orbitR: SC * (0.9 + Math.random() * 0.8),
      angle: (i / 6) * TAU,
      speed: 0.001 + Math.random() * 0.002,
      scale: SC * (0.15 + Math.random() * 0.15),
      rot: Math.random() * TAU,
      rotSpeed: (Math.random() - 0.5) * 0.005,
    });
  }
}

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════

let audioCtx, muteGain, audioElement, audioSource, analyser;
let freqData, freqDataLen;
let audioMuted = false;
let audioBands = { kick: 0, low: 0, mid: 0, high: 0, overall: 0 };

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  muteGain = audioCtx.createGain();
  muteGain.gain.value = 1;
  muteGain.connect(audioCtx.destination);

  audioElement = new Audio('coconut.mp3');
  audioElement.crossOrigin = 'anonymous';
  audioElement.loop = true;

  audioSource = audioCtx.createMediaElementSource(audioElement);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;
  freqDataLen = analyser.frequencyBinCount;
  freqData = new Uint8Array(freqDataLen);

  audioSource.connect(analyser);
  analyser.connect(muteGain);
  audioElement.play();
}

function toggleAudio() {
  if (!audioCtx) return;
  audioMuted = !audioMuted;
  muteGain.gain.linearRampToValueAtTime(audioMuted ? 0 : 1, audioCtx.currentTime + 0.1);
  let btn = document.getElementById('audio-toggle');
  btn.textContent = audioMuted ? 'AUDIO OFF' : 'AUDIO ON';
  btn.classList.toggle('muted', audioMuted);
}

function analyseAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(freqData);
  let kick = 0, low = 0, mid = 0, high = 0;
  for (let i = 0; i <= 2; i++) kick += freqData[i];
  kick /= (3 * 255);
  for (let i = 3; i <= 9; i++) low += freqData[i];
  low /= (7 * 255);
  for (let i = 10; i <= 46; i++) mid += freqData[i];
  mid /= (37 * 255);
  for (let i = 47; i <= 120; i++) high += freqData[i];
  high /= (74 * 255);

  let sm = 0.15;
  audioBands.kick += (kick - audioBands.kick) * sm;
  audioBands.low += (low - audioBands.low) * sm;
  audioBands.mid += (mid - audioBands.mid) * sm;
  audioBands.high += (high - audioBands.high) * sm;
  audioBands.overall = (audioBands.kick + audioBands.low + audioBands.mid + audioBands.high) / 4;
}

// ═══════════════════════════════════════════════════════
// BUTTON HANDLERS
// ═══════════════════════════════════════════════════════

function flashBtn(id) {
  let el = document.getElementById(id);
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function cycleColor() {
  if (!started) return;
  colorMode = (colorMode + 1) % 3;
  flashBtn('btn-color');
}

function cycleGlyph() {
  if (!started) return;
  glyphIdx = (glyphIdx + 1) % GLYPHS.length;
  glyphDrawOn = 0; // trigger draw-on animation
  flashBtn('btn-glitch');
}

function cycleMotion() {
  if (!started) return;
  motionMode = (motionMode + 1) % 6;
  flashBtn('btn-motion');
}

document.addEventListener('keydown', (e) => {
  if (e.key === '1') cycleColor();
  if (e.key === '2') cycleGlyph();
  if (e.key === '3') cycleMotion();
  if (e.key === ' ' && !started) initExperience();
});

// ═══════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════

const PHASE_FRAMES = [900, 1800, 2700, 2250, 1350];
function getPhase(f) {
  let acc = 0;
  for (let i = 0; i < PHASE_FRAMES.length; i++) {
    if (f < acc + PHASE_FRAMES[i]) return { phase: i, phaseT: (f - acc) / PHASE_FRAMES[i] };
    acc += PHASE_FRAMES[i];
  }
  return { phase: 4, phaseT: 1 };
}

let globalDrawOn = 0;
let glyphDrawOn = 1;
let baseRotation = 0;
let autoGlyphTimer = 0;

function timelineUpdate() {
  let { phase, phaseT } = getPhase(frame);

  // Auto-cycle glyphs every ~8 seconds
  autoGlyphTimer++;
  if (autoGlyphTimer > 240) {
    autoGlyphTimer = 0;
    glyphIdx = (glyphIdx + 1) % GLYPHS.length;
    glyphDrawOn = 0;
  }

  // Draw-on animation — dynamic speed: starts slow, accelerates, audio-reactive
  if (glyphDrawOn < 1) {
    let baseSpeed = 0.005;
    let accel = glyphDrawOn * 0.02; // faster as it progresses
    let audioBoost = audioBands.kick * 0.04 + audioBands.overall * 0.01;
    glyphDrawOn = Math.min(1, glyphDrawOn + baseSpeed + accel + audioBoost);
  }

  // Phase 0: GENESIS — fade in first glyph
  if (phase === 0) {
    globalDrawOn = phaseT;
    colorMode = 0;
  }
  // Phase 1: INSCRIPTION — cycling glyphs, white
  else if (phase === 1) {
    globalDrawOn = 1;
    colorMode = 0;
  }
  // Phase 2: PROCESSION — gold enters
  else if (phase === 2) {
    globalDrawOn = 1;
    colorMode = phaseT < 0.5 ? 2 : 1;
  }
  // Phase 3: RAPTURE — fast cycling, both colors
  else if (phase === 3) {
    globalDrawOn = 1;
    colorMode = 2;
    if (autoGlyphTimer > 120) { // faster cycling
      autoGlyphTimer = 0;
      glyphIdx = (glyphIdx + 1) % GLYPHS.length;
      glyphDrawOn = 0;
    }
  }
  // Phase 4: STILL — deconstruct
  else if (phase === 4) {
    globalDrawOn = 1 - phaseT;
    colorMode = 0;
  }
}

// ═══════════════════════════════════════════════════════
// MOTION
// ═══════════════════════════════════════════════════════

function updateMotion() {
  let kickPulse = audioBands.kick * 0.02;

  switch (motionMode) {
    case 0: baseRotation += 0.002 + kickPulse; break;
    case 1: baseRotation += 0.005 + kickPulse; break; // faster
    case 2: baseRotation += Math.sin(frame * 0.003) * 0.004; break; // pendulum
    case 3: baseRotation -= 0.003 - kickPulse; break; // reverse
    case 4: baseRotation += 0.001; break; // slow
    case 5: baseRotation += (0.003 + audioBands.mid * 0.01); break; // mid-reactive
  }
}

// ═══════════════════════════════════════════════════════
// REGISTRATION MARKS
// ═══════════════════════════════════════════════════════

function drawRegistration(col) {
  ctx.strokeStyle = col;
  ctx.lineWidth = 0.5;
  let mi = 30, ml = 14;
  ctx.beginPath();
  ctx.moveTo(mi + ml, mi); ctx.lineTo(mi, mi); ctx.lineTo(mi, mi + ml);
  ctx.moveTo(W - mi - ml, mi); ctx.lineTo(W - mi, mi); ctx.lineTo(W - mi, mi + ml);
  ctx.moveTo(mi + ml, H - mi); ctx.lineTo(mi, H - mi); ctx.lineTo(mi, H - mi - ml);
  ctx.moveTo(W - mi - ml, H - mi); ctx.lineTo(W - mi, H - mi); ctx.lineTo(W - mi, H - mi - ml);
  ctx.stroke();

  // Center crosshair
  ctx.beginPath();
  ctx.moveTo(CX - 8, CY); ctx.lineTo(CX + 8, CY);
  ctx.moveTo(CX, CY - 8); ctx.lineTo(CX, CY + 8);
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function render() {
  if (!started) { requestAnimationFrame(render); return; }

  frame++;
  if (frame > TOTAL_FRAMES) frame = TOTAL_FRAMES;

  analyseAudio();
  timelineUpdate();
  updateMotion();

  let fgWhite = COLORS.white;
  let fgGold = COLORS.gold;
  let fgMain = colorMode === 1 ? fgGold : fgWhite;
  let fgAlt = colorMode === 1 ? fgWhite : fgGold;

  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Registration marks
  drawRegistration('rgba(228,225,218,0.06)');

  // Audio-reactive scale
  let kickScale = 1 + audioBands.kick * 0.15;
  let glyphScale = SC * 2.0 * kickScale;

  // ── CENTRAL GLYPH — just the symbol, nothing else ──
  let centralDraw = globalDrawOn * glyphDrawOn;
  if (centralDraw > 0) {
    drawGlyph(
      GLYPHS[glyphIdx],
      CX, CY,
      glyphScale,
      centralDraw,
      fgMain,
      2.5,
      0
    );

    // Ghost echo (thinner, slight offset) in dual color mode
    if (colorMode === 2 && globalDrawOn > 0.5) {
      drawGlyph(
        GLYPHS[glyphIdx],
        CX, CY,
        glyphScale * 1.04,
        centralDraw,
        'rgba(218,176,62,0.1)',
        0.5,
        0.01
      );
    }
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

function initExperience() {
  if (started) return;
  started = true;
  document.getElementById('overlay').style.display = 'none';
  initAudio();
  frame = 0;
  globalDrawOn = 0;
  glyphDrawOn = 0;
  glyphIdx = 0;
}

render();
</script>
</body>
</html>
