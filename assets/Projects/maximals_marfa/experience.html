<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIMALS — MARFA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #040808; }
canvas { display: block; }

#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #040808; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#overlay span {
  font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 4px;
  color: rgba(160,220,230,0.35); text-transform: uppercase;
}

#buttons {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 28px; z-index: 100;
}

.arc-btn {
  width: 76px; height: 76px; border-radius: 50%; border: none; cursor: pointer;
  position: relative; outline: none;
  box-shadow:
    0 4px 14px rgba(0,0,0,0.7),
    inset 0 -6px 14px rgba(0,0,0,0.4),
    inset 0 6px 14px rgba(255,255,255,0.12);
  transition: transform 0.08s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.arc-btn:active {
  transform: scale(0.90) translateY(3px);
  box-shadow:
    0 1px 4px rgba(0,0,0,0.7),
    inset 0 -2px 6px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.08);
}
.arc-btn::after {
  content: ''; position: absolute; top: 11%; left: 18%; width: 36%; height: 24%;
  border-radius: 50%; background: rgba(255,255,255,0.22);
  filter: blur(5px); pointer-events: none;
}
.arc-btn.flash { animation: btnFlash 0.3s ease-out; }
@keyframes btnFlash {
  0% { box-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow), 0 4px 14px rgba(0,0,0,0.7); transform: scale(1.12); }
  100% { box-shadow: 0 4px 14px rgba(0,0,0,0.7), inset 0 -6px 14px rgba(0,0,0,0.4), inset 0 6px 14px rgba(255,255,255,0.12); transform: scale(1); }
}

#btn-color {
  background: radial-gradient(circle at 38% 33%, #aaffee, #338888 40%, #114444);
  --glow: rgba(100,240,220,0.4);
}
#btn-glitch {
  background: radial-gradient(circle at 38% 33%, #bb88ff, #6622bb 40%, #331166);
  --glow: rgba(150,100,255,0.5);
}
#btn-motion {
  background: radial-gradient(circle at 38% 33%, #fff, #ccc 25%, #888 50%, #444 75%, #222 100%);
  --glow: rgba(255,255,255,0.4);
  border: 2px solid rgba(255,255,255,0.1);
}

.btn-label {
  position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
  font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.3); pointer-events: none; white-space: nowrap;
  text-transform: uppercase;
}

#audio-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 100;
  background: none; border: 1px solid rgba(160,220,230,0.15); cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 2px;
  color: rgba(160,220,230,0.4); text-transform: uppercase;
  padding: 6px 14px;
}
#audio-toggle:hover { border-color: rgba(160,220,230,0.35); color: rgba(160,220,230,0.55); }
#audio-toggle.muted { color: rgba(160,220,230,0.15); border-color: rgba(160,220,230,0.08); }

@media (max-width: 600px) {
  .arc-btn { width: 62px; height: 62px; }
  #buttons { gap: 18px; bottom: 30px; }
}
</style>
</head>
<body>

<div id="overlay" onclick="initExperience()"><span>tap to witness</span></div>

<button id="audio-toggle" onclick="toggleAudio()">AUDIO ON</button>

<div id="buttons">
  <button class="arc-btn" id="btn-color" onclick="cycleColor()">
    <span class="btn-label">COLOR</span>
  </button>
  <button class="arc-btn" id="btn-glitch" onclick="cycleGlitch()">
    <span class="btn-label">FORM</span>
  </button>
  <button class="arc-btn" id="btn-motion" onclick="cycleMotion()">
    <span class="btn-label">MOTION</span>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// MAXIMALS — MARFA : LASER CATHEDRAL
// 3D wireframe geometry with bloom/glow/trails
// ═══════════════════════════════════════════════════════

const PI = Math.PI, TAU = PI * 2;

// ── CANVAS ──────────────────────────────────────────
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.prepend(canvas);

let W, H, CX, CY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── STATE ───────────────────────────────────────────
let started = false;
let frame = 0;
const TOTAL_FRAMES = 9000; // 5 min at 30fps

let colorMode = 0;
let formMode = 0;
let motionMode = 0;

// Color palettes — cyan/teal dominant
const PALETTES = [
  { primary: [140, 230, 255], secondary: [80, 180, 200], accent: [200, 170, 255], bg: [4, 8, 8] },    // CYAN
  { primary: [180, 140, 255], secondary: [120, 80, 200], accent: [140, 230, 255], bg: [6, 4, 10] },    // VIOLET
  { primary: [255, 255, 255], secondary: [180, 200, 210], accent: [140, 230, 255], bg: [4, 4, 4] },     // WHITE
  { primary: [255, 200, 100], secondary: [200, 140, 60], accent: [255, 120, 60], bg: [8, 5, 2] },      // AMBER
];

// ═══════════════════════════════════════════════════════
// 3D GEOMETRY DEFINITIONS
// ═══════════════════════════════════════════════════════

// Cube with inner diagonals
function geoCube() {
  let s = 1;
  let v = [
    [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
    [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]
  ];
  let e = [
    [0,1],[1,2],[2,3],[3,0], // front
    [4,5],[5,6],[6,7],[7,4], // back
    [0,4],[1,5],[2,6],[3,7], // sides
    [0,6],[1,7],[2,4],[3,5], // inner diags
  ];
  return { v, e };
}

// Octahedron / diamond
function geoOctahedron() {
  let s = 1.3;
  let v = [[0,s,0],[0,-s,0],[s,0,0],[-s,0,0],[0,0,s],[0,0,-s]];
  let e = [
    [0,2],[0,3],[0,4],[0,5],
    [1,2],[1,3],[1,4],[1,5],
    [2,4],[4,3],[3,5],[5,2],
  ];
  return { v, e };
}

// Icosahedron
function geoIcosahedron() {
  let t = (1 + Math.sqrt(5)) / 2;
  let s = 0.8;
  let v = [
    [-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],
    [0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],
    [t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]
  ].map(p => p.map(c => c * s));
  let e = [
    [0,1],[0,5],[0,7],[0,10],[0,11],
    [1,5],[1,7],[1,8],[1,9],
    [2,3],[2,4],[2,6],[2,10],[2,11],
    [3,4],[3,6],[3,8],[3,9],
    [4,5],[4,9],[4,11],
    [5,9],[5,11],
    [6,7],[6,8],[6,10],
    [7,8],[7,10],
    [8,9],[10,11]
  ];
  return { v, e };
}

// Stellated cube (cube + octahedron intersected)
function geoStellated() {
  let cube = geoCube();
  let oct = geoOctahedron();
  let v = [...cube.v, ...oct.v];
  let e = [...cube.e];
  // Offset octahedron edges
  for (let ed of oct.e) e.push([ed[0] + 8, ed[1] + 8]);
  // Connect cube corners to nearest oct verts
  e.push([0,8],[2,8],[5,8],[7,8]); // top
  e.push([1,9],[3,9],[4,9],[6,9]); // bottom
  return { v, e };
}

// Lissajous 3D orbit (parametric curve)
function geoLissajous(ax, ay, az, dx, dy, dz, n) {
  let v = [];
  let e = [];
  for (let i = 0; i <= n; i++) {
    let t = (i / n) * TAU * 2;
    v.push([
      Math.sin(ax * t + dx) * 1.2,
      Math.sin(ay * t + dy) * 1.2,
      Math.sin(az * t + dz) * 1.2
    ]);
    if (i > 0) e.push([i - 1, i]);
  }
  return { v, e };
}

// Sine wave array (multiple parallel waves)
function geoSineWaves(count, freq, amp) {
  let v = [];
  let e = [];
  let pts = 60;
  for (let w = 0; w < count; w++) {
    let phase = (w / count) * TAU;
    let yOff = (w / (count - 1) - 0.5) * 2;
    for (let i = 0; i <= pts; i++) {
      let t = (i / pts) * TAU * freq;
      let x = (i / pts - 0.5) * 3;
      let y = Math.sin(t + phase) * amp + yOff * 0.1;
      let z = Math.cos(t + phase) * amp * 0.3;
      let idx = v.length;
      v.push([x, y, z]);
      if (i > 0) e.push([idx - 1, idx]);
    }
  }
  return { v, e };
}

// Helix / spiral cylinder
function geoHelix(rings, pointsPerRing, radius, height) {
  let v = [];
  let e = [];
  let totalPoints = rings * pointsPerRing;
  for (let i = 0; i < totalPoints; i++) {
    let a = (i / pointsPerRing) * TAU;
    let y = (i / totalPoints - 0.5) * height;
    v.push([Math.cos(a) * radius, y, Math.sin(a) * radius]);
    if (i > 0) e.push([i - 1, i]);
    // Connect to point one ring above
    if (i >= pointsPerRing) e.push([i, i - pointsPerRing]);
  }
  return { v, e };
}

// Tetrahedron frame
function geoTetrahedron() {
  let s = 1.3;
  let v = [
    [s, s, s], [s, -s, -s], [-s, s, -s], [-s, -s, s]
  ];
  let e = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
  return { v, e };
}

// All geometry forms
const FORMS = [
  geoCube(),
  geoOctahedron(),
  geoIcosahedron(),
  geoStellated(),
  geoLissajous(3, 2, 5, 0, PI/2, PI/4, 200),
  geoSineWaves(8, 1.5, 0.6),
  geoHelix(6, 24, 1.0, 3),
  geoTetrahedron(),
  geoLissajous(5, 4, 3, PI/3, 0, PI/6, 300),
  geoSineWaves(12, 2, 0.4),
];

// ═══════════════════════════════════════════════════════
// MORPH ENGINE — interpolate between geometries
// ═══════════════════════════════════════════════════════

let currentForm = 0;
let targetForm = 0;
let morphT = 1;
let morphDuration = 180; // frames (~6 sec)

function padGeometry(a, b) {
  let maxV = Math.max(a.v.length, b.v.length);
  let maxE = Math.max(a.e.length, b.e.length);
  let pv = (arr, len) => {
    let r = arr.slice();
    while (r.length < len) r.push([0, 0, 0]);
    return r;
  };
  let pe = (arr, len, maxIdx) => {
    let r = arr.slice();
    while (r.length < len) r.push([0, 0]);
    return r;
  };
  return [
    { v: pv(a.v, maxV), e: pe(a.e, maxE, maxV) },
    { v: pv(b.v, maxV), e: pe(b.e, maxE, maxV) }
  ];
}

function startMorph(idx) {
  if (idx === currentForm && morphT >= 1) return;
  targetForm = idx;
  morphT = 0;
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function getMorphedGeometry() {
  if (morphT >= 1) return FORMS[currentForm];
  let [a, b] = padGeometry(FORMS[currentForm], FORMS[targetForm]);
  let t = easeInOutCubic(morphT);
  let v = a.v.map((p, i) => [
    p[0] + (b.v[i][0] - p[0]) * t,
    p[1] + (b.v[i][1] - p[1]) * t,
    p[2] + (b.v[i][2] - p[2]) * t,
  ]);
  let e = a.e.map((ed, i) => {
    let be = b.e[i] || [0, 0];
    return [
      Math.round(ed[0] + (be[0] - ed[0]) * t),
      Math.round(ed[1] + (be[1] - ed[1]) * t),
    ];
  });
  return { v, e };
}

// ═══════════════════════════════════════════════════════
// 3D PROJECTION
// ═══════════════════════════════════════════════════════

let camDist = 4.5;
let rotX = 0.3, rotY = 0;

function project(p) {
  // Rotate Y
  let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 = p[0] * cosY - p[2] * sinY;
  let z1 = p[0] * sinY + p[2] * cosY;
  let y1 = p[1];
  // Rotate X
  let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let y2 = y1 * cosX - z1 * sinX;
  let z2 = y1 * sinX + z1 * cosX;
  let x2 = x1;
  // Perspective
  let d = camDist - z2;
  if (d < 0.1) d = 0.1;
  let scale = Math.min(W, H) * 0.32;
  let fov = scale / d;
  return {
    x: CX + x2 * fov,
    y: CY - y2 * fov,
    z: z2,
    scale: fov / scale,
  };
}

// ═══════════════════════════════════════════════════════
// BLOOM LINE RENDERER
// ═══════════════════════════════════════════════════════

function drawGlowLine(x1, y1, x2, y2, col, brightness) {
  let b = brightness;
  // Outer glow (wide, dim)
  ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${0.03 * b})`;
  ctx.lineWidth = 16 * b;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

  // Mid glow
  ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${0.08 * b})`;
  ctx.lineWidth = 6 * b;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

  // Core
  ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${0.5 * b})`;
  ctx.lineWidth = 2 * b;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

  // Hot center
  ctx.strokeStyle = `rgba(255,255,255,${0.4 * b})`;
  ctx.lineWidth = 0.8 * b;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawGlowPoint(x, y, col, brightness, radius) {
  let b = brightness;
  let r = radius || 1;
  // Outer halo
  let grad = ctx.createRadialGradient(x, y, 0, x, y, 20 * b * r);
  grad.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${0.2 * b})`);
  grad.addColorStop(0.4, `rgba(${col[0]},${col[1]},${col[2]},${0.05 * b})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 20 * b * r, y - 20 * b * r, 40 * b * r, 40 * b * r);

  // Core dot
  ctx.fillStyle = `rgba(255,255,255,${0.8 * b})`;
  ctx.beginPath(); ctx.arc(x, y, 2 * b * r, 0, TAU); ctx.fill();
}

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE — MP3 playback + frequency analysis
// ═══════════════════════════════════════════════════════

let audioCtx, muteGain;
let audioElement, audioSource, analyser;
let freqData, freqDataLen;
let audioMuted = false;

let audioBands = { kick: 0, low: 0, mid: 0, high: 0, overall: 0 };
let bandSmooth = 0.15;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  muteGain = audioCtx.createGain();
  muteGain.gain.value = 1;
  muteGain.connect(audioCtx.destination);

  audioElement = new Audio('coconut.mp3');
  audioElement.crossOrigin = 'anonymous';
  audioElement.loop = true;

  audioSource = audioCtx.createMediaElementSource(audioElement);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;
  freqDataLen = analyser.frequencyBinCount;
  freqData = new Uint8Array(freqDataLen);

  audioSource.connect(analyser);
  analyser.connect(muteGain);
  audioElement.play();
}

function toggleAudio() {
  if (!audioCtx) return;
  audioMuted = !audioMuted;
  let t = audioCtx.currentTime;
  muteGain.gain.linearRampToValueAtTime(audioMuted ? 0 : 1, t + 0.1);
  let btn = document.getElementById('audio-toggle');
  btn.textContent = audioMuted ? 'AUDIO OFF' : 'AUDIO ON';
  btn.classList.toggle('muted', audioMuted);
}

function analyseAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(freqData);

  let kick = 0, low = 0, mid = 0, high = 0;
  for (let i = 0; i <= 2; i++) kick += freqData[i];
  kick = kick / (3 * 255);
  for (let i = 3; i <= 9; i++) low += freqData[i];
  low = low / (7 * 255);
  for (let i = 10; i <= 46; i++) mid += freqData[i];
  mid = mid / (37 * 255);
  for (let i = 47; i <= 120; i++) high += freqData[i];
  high = high / (74 * 255);

  audioBands.kick += (kick - audioBands.kick) * bandSmooth;
  audioBands.low += (low - audioBands.low) * bandSmooth;
  audioBands.mid += (mid - audioBands.mid) * bandSmooth;
  audioBands.high += (high - audioBands.high) * bandSmooth;
  audioBands.overall = (audioBands.kick + audioBands.low + audioBands.mid + audioBands.high) / 4;
}

// ═══════════════════════════════════════════════════════
// BUTTON HANDLERS
// ═══════════════════════════════════════════════════════

function flashBtn(id) {
  let el = document.getElementById(id);
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function cycleColor() {
  if (!started) return;
  colorMode = (colorMode + 1) % PALETTES.length;
  flashBtn('btn-color');
}

function cycleGlitch() {
  if (!started) return;
  formMode = (formMode + 1) % FORMS.length;
  startMorph(formMode);
  flashBtn('btn-glitch');
}

function cycleMotion() {
  if (!started) return;
  motionMode = (motionMode + 1) % 6;
  flashBtn('btn-motion');
}

document.addEventListener('keydown', (e) => {
  if (e.key === '1') cycleColor();
  if (e.key === '2') cycleGlitch();
  if (e.key === '3') cycleMotion();
  if (e.key === ' ') { if (!started) initExperience(); }
});

// ═══════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════

const PHASE_FRAMES = [900, 1800, 2700, 2250, 1350];
function getPhase(f) {
  let acc = 0;
  for (let i = 0; i < PHASE_FRAMES.length; i++) {
    if (f < acc + PHASE_FRAMES[i]) {
      return { phase: i, phaseT: (f - acc) / PHASE_FRAMES[i] };
    }
    acc += PHASE_FRAMES[i];
  }
  return { phase: 4, phaseT: 1 };
}

let trailAlpha = 0.08; // how much previous frame persists

function timelineUpdate() {
  let { phase, phaseT } = getPhase(frame);

  // Phase 0: GENESIS — single form fading in
  if (phase === 0) {
    trailAlpha = 0.06 + phaseT * 0.04;
    if (morphT >= 1 && currentForm !== 0) startMorph(0);
  }
  // Phase 1: INSCRIPTION — morph through simple polyhedra
  else if (phase === 1) {
    trailAlpha = 0.07;
    let idx = Math.floor(phaseT * 3); // 0→2
    if (morphT >= 1 && currentForm !== idx + 1) startMorph(idx + 1);
    if (phaseT < 0.5) colorMode = 0;
    else colorMode = 2;
  }
  // Phase 2: PROCESSION — complex forms, Lissajous, waves
  else if (phase === 2) {
    trailAlpha = 0.05;
    let targets = [3, 4, 5, 6];
    let idx = Math.floor(phaseT * 4);
    if (idx > 3) idx = 3;
    if (morphT >= 1 && currentForm !== targets[idx]) startMorph(targets[idx]);
    colorMode = [0, 1, 0, 3][idx];
  }
  // Phase 3: RAPTURE — fast morphing, max trails
  else if (phase === 3) {
    trailAlpha = 0.03 + (1 - phaseT) * 0.02; // more trails
    let targets = [7, 8, 9, 3, 0];
    let idx = Math.floor(phaseT * 5);
    if (idx > 4) idx = 4;
    if (morphT >= 1 && currentForm !== targets[idx]) {
      startMorph(targets[idx]);
      morphDuration = 90; // faster morphs
    }
    motionMode = 3; // tumble
    colorMode = idx % PALETTES.length;
  }
  // Phase 4: STILL — return to simple, fade out
  else if (phase === 4) {
    trailAlpha = 0.04 + phaseT * 0.1; // trails disappear
    if (morphT >= 1 && currentForm !== 0 && phaseT < 0.1) startMorph(0);
    motionMode = 0;
    colorMode = 0;
  }
}

// ═══════════════════════════════════════════════════════
// MOTION MODES
// ═══════════════════════════════════════════════════════

function updateMotion() {
  let baseSpeed = 0.003;
  let audioBoost = 1 + audioBands.kick * 2;

  switch (motionMode) {
    case 0: // Slow Y rotation
      rotY += baseSpeed * audioBoost;
      rotX += Math.sin(frame * 0.001) * 0.0005;
      break;
    case 1: // Slow X+Y
      rotY += baseSpeed * 0.7 * audioBoost;
      rotX += baseSpeed * 0.4 * audioBoost;
      break;
    case 2: // Pendulum
      rotY += baseSpeed * audioBoost;
      rotX = 0.3 + Math.sin(frame * 0.006) * 0.4;
      break;
    case 3: // Tumble
      rotY += baseSpeed * 1.5 * audioBoost;
      rotX += baseSpeed * 0.8 * audioBoost;
      break;
    case 4: // Breathing zoom
      rotY += baseSpeed * audioBoost;
      camDist = 4.5 + Math.sin(frame * 0.008) * 1.0;
      break;
    case 5: // Orbit
      rotY += baseSpeed * 2 * audioBoost;
      rotX = Math.sin(frame * 0.004) * 0.5;
      camDist = 4 + Math.sin(frame * 0.006) * 0.8;
      break;
  }
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════

function render() {
  if (!started) { requestAnimationFrame(render); return; }
  frame++;
  if (frame > TOTAL_FRAMES) frame = TOTAL_FRAMES;

  analyseAudio();
  timelineUpdate();

  // Morph
  if (morphT < 1) {
    morphT += 1 / morphDuration;
    if (morphT >= 1) {
      morphT = 1;
      currentForm = targetForm;
      formMode = currentForm;
      morphDuration = 180; // reset
    }
  }

  updateMotion();

  let pal = PALETTES[colorMode];
  let bg = pal.bg;

  // Trail: semi-transparent dark overlay (controls persistence)
  ctx.fillStyle = `rgba(${bg[0]},${bg[1]},${bg[2]},${trailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Atmospheric haze — subtle radial
  let hazeGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.6);
  hazeGrad.addColorStop(0, `rgba(${pal.primary[0]},${pal.primary[1]},${pal.primary[2]},0.008)`);
  hazeGrad.addColorStop(0.5, `rgba(${pal.primary[0]},${pal.primary[1]},${pal.primary[2]},0.003)`);
  hazeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hazeGrad;
  ctx.fillRect(0, 0, W, H);

  // Get geometry
  let geo = getMorphedGeometry();

  // Audio-reactive scale
  let scaleBoost = 1 + audioBands.kick * 0.3 + audioBands.low * 0.15;
  let brightBoost = 1 + audioBands.overall * 1.5;

  // Phase-based draw-on
  let { phase, phaseT } = getPhase(frame);
  let drawFraction = 1;
  if (phase === 0) drawFraction = phaseT;
  else if (phase === 4) drawFraction = 1 - phaseT;

  // Project vertices
  let projected = geo.v.map(p => {
    let sp = [p[0] * scaleBoost, p[1] * scaleBoost, p[2] * scaleBoost];
    return project(sp);
  });

  // Sort edges by average depth (far first)
  let edgesWithDepth = geo.e.map((ed, i) => {
    let p0 = projected[ed[0]];
    let p1 = projected[ed[1]];
    if (!p0 || !p1) return null;
    return { idx: i, depth: (p0.z + p1.z) / 2 };
  }).filter(Boolean);
  edgesWithDepth.sort((a, b) => a.depth - b.depth);

  // Draw edges
  ctx.lineCap = 'round';
  let edgesToDraw = Math.floor(edgesWithDepth.length * drawFraction);

  for (let ei = 0; ei < edgesToDraw; ei++) {
    let { idx, depth } = edgesWithDepth[ei];
    let ed = geo.e[idx];
    let p0 = projected[ed[0]];
    let p1 = projected[ed[1]];

    // Depth-based brightness
    let depthBright = Math.max(0.2, Math.min(1, (p0.scale + p1.scale)));
    let b = depthBright * brightBoost;

    // Pick color based on depth
    let col = depth > 0 ? pal.primary : pal.secondary;

    drawGlowLine(p0.x, p0.y, p1.x, p1.y, col, b);
  }

  // Draw vertex points
  let vertsToDraw = Math.floor(projected.length * drawFraction);
  for (let i = 0; i < vertsToDraw; i++) {
    let p = projected[i];
    if (!p) continue;
    let b = Math.max(0.3, p.scale) * brightBoost;
    // Only draw vertex dots for polyhedra (shorter vertex lists)
    if (geo.v.length < 50) {
      drawGlowPoint(p.x, p.y, pal.accent, b, 1 + audioBands.kick * 2);
    }
  }

  // Subtle scan line overlay (every 3rd pixel row)
  if (phase === 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < H; y += 3) {
      ctx.fillRect(0, y, W, 1);
    }
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

function initExperience() {
  if (started) return;
  started = true;
  document.getElementById('overlay').style.display = 'none';
  initAudio();
  frame = 0;
  currentForm = 0;
  targetForm = 0;
  morphT = 1;

  // Clear canvas fully at start
  ctx.fillStyle = '#040808';
  ctx.fillRect(0, 0, W, H);
}

render();
</script>
</body>
