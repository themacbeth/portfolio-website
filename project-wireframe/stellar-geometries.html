<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WIREFRAME — STELLAR GEOMETRIES</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #start { position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; background: #000; cursor: pointer; }
  #start span { color: #a00; font: 13px monospace; opacity: 0.5; }
  .gone { display: none !important; }
</style>
</head>
<body>
<div id="start"><span>click to begin</span></div>
<canvas id="c"></canvas>
<script>
const THUMB = new URLSearchParams(location.search).has('mute');
const C = document.getElementById('c');
const X = C.getContext('2d');
const DUR = 40;
let T = 0, on = false;

function sz() { C.width = innerWidth; C.height = innerHeight; }
sz(); addEventListener('resize', sz);

const PI = Math.PI, TWO = PI * 2;

// ═══════════════════════════════════════════
// AUDIO — deep spatial drone
// ═══════════════════════════════════════════
let AC, masterGain;

async function initAudio() {
  AC = new AudioContext();
  masterGain = AC.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(AC.destination);

  // Reverb
  const conv = AC.createConvolver();
  const revLen = AC.sampleRate * 5;
  const revBuf = AC.createBuffer(2, revLen, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (AC.sampleRate * 2)) * 0.5;
    }
  }
  conv.buffer = revBuf;

  const dry = AC.createGain(); dry.gain.value = 0.3;
  const wet = AC.createGain(); wet.gain.value = 0.7;
  const bus = AC.createGain();
  bus.connect(dry); bus.connect(conv);
  conv.connect(wet);
  dry.connect(masterGain); wet.connect(masterGain);

  // Perfect fifth drone — architectural
  [55, 82.41, 110, 164.81].forEach((freq, i) => {
    const osc = AC.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = AC.createGain();
    g.gain.value = [0.08, 0.05, 0.04, 0.02][i];
    osc.connect(g); g.connect(bus);
    osc.start();

    // Gentle detuning
    const vib = AC.createOscillator();
    vib.frequency.value = 0.05 + i * 0.02;
    const vg = AC.createGain();
    vg.gain.value = 0.5;
    vib.connect(vg); vg.connect(osc.frequency);
    vib.start();
  });

  // Soft noise — spatial texture
  const nBuf = AC.createBuffer(1, AC.sampleRate * 2, AC.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = AC.createBufferSource();
  nSrc.buffer = nBuf; nSrc.loop = true;
  const lp = AC.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 300; lp.Q.value = 0.5;
  const ng = AC.createGain(); ng.gain.value = 0.015;
  nSrc.connect(lp); lp.connect(ng); ng.connect(bus);
  nSrc.start();

  masterGain.gain.setTargetAtTime(0.22, AC.currentTime, 3);
}

// ═══════════════════════════════════════════
// SEEDED RANDOM
// ═══════════════════════════════════════════
function hash(x, y) {
  let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return h - Math.floor(h);
}

// ═══════════════════════════════════════════
// ARCHITECTURAL GRID SUBSTRATE
// ═══════════════════════════════════════════
function drawSubstrate(t) {
  const w = C.width, h = C.height;
  const cellSize = 40;
  const cols = Math.ceil(w / cellSize) + 2;
  const rows = Math.ceil(h / cellSize) + 2;
  const drift = t * 3;

  // Micro grid — city-like texture
  for (let gy = -1; gy < rows; gy++) {
    for (let gx = -1; gx < cols; gx++) {
      const wx = gx * cellSize + (drift * 0.3) % cellSize;
      const wy = gy * cellSize + (drift * 0.2) % cellSize;

      const v = hash(Math.floor(gx + t * 0.07), Math.floor(gy + t * 0.05));

      if (v > 0.85) {
        // Small filled block
        const bSize = 3 + v * 8;
        X.fillStyle = `rgba(255,20,12,${0.03 + v * 0.04})`;
        X.fillRect(wx - bSize/2, wy - bSize/2, bSize, bSize);
      } else if (v > 0.7) {
        // Tiny dot
        X.fillStyle = `rgba(255,25,15,${0.04})`;
        X.fillRect(wx, wy, 1, 1);
      } else if (v > 0.65) {
        // Short line segment
        X.strokeStyle = `rgba(255,20,12,${0.025})`;
        X.lineWidth = 0.5;
        X.beginPath();
        const angle = Math.floor(v * 4) * PI / 2;
        X.moveTo(wx, wy);
        X.lineTo(wx + Math.cos(angle) * 12, wy + Math.sin(angle) * 12);
        X.stroke();
      }
    }
  }

  // Faint orthogonal grid
  X.strokeStyle = 'rgba(255,18,10,0.015)';
  X.lineWidth = 0.5;
  for (let x = 0; x < w; x += cellSize) {
    X.beginPath(); X.moveTo(x, 0); X.lineTo(x, h); X.stroke();
  }
  for (let y = 0; y < h; y += cellSize) {
    X.beginPath(); X.moveTo(0, y); X.lineTo(w, y); X.stroke();
  }
}

// ═══════════════════════════════════════════
// COMPOSITIONAL ELEMENTS — Kandinsky-inspired
// ═══════════════════════════════════════════

// Persistent composition elements seeded once
const composition = {
  circles: [],
  rectangles: [],
  diagonals: [],
  curves: [],
  points: [],
  init: false
};

function initComposition() {
  if (composition.init) return;
  composition.init = true;

  const rng = (i) => hash(i * 3.7, i * 7.3);

  // 3-5 major circles
  for (let i = 0; i < 4; i++) {
    composition.circles.push({
      x: 0.15 + rng(i * 10) * 0.7,
      y: 0.2 + rng(i * 10 + 1) * 0.6,
      r: 0.08 + rng(i * 10 + 2) * 0.2,
      weight: 0.5 + rng(i * 10 + 3) * 1.5,
      alpha: 0.08 + rng(i * 10 + 4) * 0.15,
      breathRate: 0.1 + rng(i * 10 + 5) * 0.3,
      phase: rng(i * 10 + 6) * TWO
    });
  }

  // 4-6 rectangles at various angles
  for (let i = 0; i < 5; i++) {
    composition.rectangles.push({
      x: 0.1 + rng(i * 20 + 50) * 0.8,
      y: 0.1 + rng(i * 20 + 51) * 0.8,
      w: 0.04 + rng(i * 20 + 52) * 0.12,
      h: 0.03 + rng(i * 20 + 53) * 0.08,
      angle: (rng(i * 20 + 54) - 0.5) * 0.4,
      alpha: 0.06 + rng(i * 20 + 55) * 0.12,
      weight: 0.5 + rng(i * 20 + 56) * 1,
      driftX: (rng(i * 20 + 57) - 0.5) * 0.002,
      driftY: (rng(i * 20 + 58) - 0.5) * 0.002
    });
  }

  // 3-4 diagonal lines spanning the canvas
  for (let i = 0; i < 3; i++) {
    composition.diagonals.push({
      x1: rng(i * 30 + 100), y1: rng(i * 30 + 101),
      x2: rng(i * 30 + 102), y2: rng(i * 30 + 103),
      alpha: 0.1 + rng(i * 30 + 104) * 0.2,
      weight: 0.5 + rng(i * 30 + 105) * 1.5,
      glow: rng(i * 30 + 106) > 0.5
    });
  }

  // 2-3 sweeping curves
  for (let i = 0; i < 2; i++) {
    composition.curves.push({
      x1: rng(i * 40 + 200), y1: rng(i * 40 + 201),
      cx: rng(i * 40 + 202), cy: rng(i * 40 + 203),
      x2: rng(i * 40 + 204), y2: rng(i * 40 + 205),
      alpha: 0.08 + rng(i * 40 + 206) * 0.12,
      weight: 0.5 + rng(i * 40 + 207) * 1
    });
  }

  // Scattered accent points
  for (let i = 0; i < 40; i++) {
    composition.points.push({
      x: rng(i * 50 + 300),
      y: rng(i * 50 + 301),
      size: 1 + rng(i * 50 + 302) * 4,
      alpha: 0.05 + rng(i * 50 + 303) * 0.2,
      pulse: rng(i * 50 + 304) * TWO
    });
  }
}

function drawCircles(t) {
  const w = C.width, h = C.height;
  const scale = Math.min(w, h);

  for (const c of composition.circles) {
    const breath = Math.sin(t * c.breathRate + c.phase) * 0.05 + 1;
    const r = c.r * scale * breath;
    const cx = c.x * w;
    const cy = c.y * h;

    // Main circle
    X.strokeStyle = `rgba(255,25,15,${c.alpha})`;
    X.lineWidth = c.weight;
    X.beginPath();
    X.arc(cx, cy, r, 0, TWO);
    X.stroke();

    // Subtle inner glow
    const grad = X.createRadialGradient(cx, cy, r * 0.8, cx, cy, r);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(255,20,12,${c.alpha * 0.15})`);
    X.fillStyle = grad;
    X.beginPath();
    X.arc(cx, cy, r, 0, TWO);
    X.fill();

    // Concentric echo (fainter)
    X.strokeStyle = `rgba(255,20,12,${c.alpha * 0.3})`;
    X.lineWidth = 0.5;
    X.beginPath();
    X.arc(cx, cy, r * 1.15, 0, TWO);
    X.stroke();
  }
}

function drawRectangles(t) {
  const w = C.width, h = C.height;

  for (const r of composition.rectangles) {
    const rx = (r.x + Math.sin(t * 0.1) * r.driftX * 10) * w;
    const ry = (r.y + Math.cos(t * 0.08) * r.driftY * 10) * h;
    const rw = r.w * w;
    const rh = r.h * h;
    const angle = r.angle + Math.sin(t * 0.05) * 0.02;

    X.save();
    X.translate(rx, ry);
    X.rotate(angle);

    // Filled rectangle (very subtle)
    X.fillStyle = `rgba(255,18,10,${r.alpha * 0.15})`;
    X.fillRect(-rw/2, -rh/2, rw, rh);

    // Stroke
    X.strokeStyle = `rgba(255,28,18,${r.alpha})`;
    X.lineWidth = r.weight;
    X.strokeRect(-rw/2, -rh/2, rw, rh);

    X.restore();
  }
}

function drawDiagonals(t) {
  const w = C.width, h = C.height;

  for (const d of composition.diagonals) {
    const x1 = d.x1 * w * 1.4 - w * 0.2;
    const y1 = d.y1 * h * 1.4 - h * 0.2;
    const x2 = d.x2 * w * 1.4 - w * 0.2;
    const y2 = d.y2 * h * 1.4 - h * 0.2;

    // Main line
    X.strokeStyle = `rgba(255,30,18,${d.alpha})`;
    X.lineWidth = d.weight;
    X.beginPath();
    X.moveTo(x1, y1);
    X.lineTo(x2, y2);
    X.stroke();

    // Glow line
    if (d.glow) {
      X.strokeStyle = `rgba(255,25,15,${d.alpha * 0.2})`;
      X.lineWidth = d.weight + 4;
      X.beginPath();
      X.moveTo(x1, y1);
      X.lineTo(x2, y2);
      X.stroke();
    }

    // Moving point along the line
    const progress = (t * 0.03 + d.x1) % 1;
    const px = x1 + (x2 - x1) * progress;
    const py = y1 + (y2 - y1) * progress;
    X.fillStyle = `rgba(255,50,30,${d.alpha * 1.5})`;
    X.beginPath();
    X.arc(px, py, 2.5, 0, TWO);
    X.fill();

    // Glow around moving point
    const pg = X.createRadialGradient(px, py, 0, px, py, 15);
    pg.addColorStop(0, `rgba(255,35,20,${d.alpha * 0.4})`);
    pg.addColorStop(1, 'transparent');
    X.fillStyle = pg;
    X.beginPath();
    X.arc(px, py, 15, 0, TWO);
    X.fill();
  }
}

function drawCurves(t) {
  const w = C.width, h = C.height;

  for (const c of composition.curves) {
    const shift = Math.sin(t * 0.1) * 0.02;

    X.strokeStyle = `rgba(255,28,18,${c.alpha})`;
    X.lineWidth = c.weight;
    X.beginPath();
    X.moveTo(c.x1 * w * 1.3 - w * 0.15, c.y1 * h * 1.3 - h * 0.15);
    X.quadraticCurveTo(
      (c.cx + shift) * w,
      (c.cy + shift) * h,
      c.x2 * w * 1.3 - w * 0.15,
      c.y2 * h * 1.3 - h * 0.15
    );
    X.stroke();

    // Glow
    X.strokeStyle = `rgba(255,20,12,${c.alpha * 0.25})`;
    X.lineWidth = c.weight + 5;
    X.beginPath();
    X.moveTo(c.x1 * w * 1.3 - w * 0.15, c.y1 * h * 1.3 - h * 0.15);
    X.quadraticCurveTo(
      (c.cx + shift) * w,
      (c.cy + shift) * h,
      c.x2 * w * 1.3 - w * 0.15,
      c.y2 * h * 1.3 - h * 0.15
    );
    X.stroke();
  }
}

function drawPoints(t) {
  const w = C.width, h = C.height;

  for (const p of composition.points) {
    const pulse = Math.sin(t * 1.5 + p.pulse) * 0.5 + 0.5;
    const px = p.x * w;
    const py = p.y * h;
    const sz = p.size * (0.8 + pulse * 0.4);

    X.fillStyle = `rgba(255,35,20,${p.alpha * (0.5 + pulse * 0.5)})`;
    X.beginPath();
    X.arc(px, py, sz, 0, TWO);
    X.fill();
  }
}

// ═══════════════════════════════════════════
// INTERSECTION HIGHLIGHTS
// ═══════════════════════════════════════════
function drawIntersections(t) {
  const w = C.width, h = C.height;

  // Where circles and lines cross — bright nodes
  for (const circ of composition.circles) {
    for (const diag of composition.diagonals) {
      const cx = circ.x * w, cy = circ.y * h;
      const lx = diag.x1 * w * 1.4 - w * 0.2;
      const ly = diag.y1 * h * 1.4 - h * 0.2;

      const dist = Math.sqrt((cx - lx) ** 2 + (cy - ly) ** 2);
      if (dist < 200) {
        const ix = (cx + lx) / 2;
        const iy = (cy + ly) / 2;
        const pulse = Math.sin(t * 2 + dist * 0.01) * 0.5 + 0.5;

        X.fillStyle = `rgba(255,50,30,${0.1 + pulse * 0.15})`;
        X.beginPath();
        X.arc(ix, iy, 3 + pulse * 2, 0, TWO);
        X.fill();

        // Small cross
        X.strokeStyle = `rgba(255,40,25,${0.08 + pulse * 0.06})`;
        X.lineWidth = 0.5;
        X.beginPath();
        X.moveTo(ix - 8, iy); X.lineTo(ix + 8, iy);
        X.moveTo(ix, iy - 8); X.lineTo(ix, iy + 8);
        X.stroke();
      }
    }
  }
}

// ═══════════════════════════════════════════
// GRAIN / NOISE TEXTURE
// ═══════════════════════════════════════════
function drawGrain(t) {
  const w = C.width, h = C.height;
  const imgData = X.getImageData(0, 0, w, h);
  const d = imgData.data;
  const seed = Math.floor(t * 10);

  // Sparse grain — not every pixel
  for (let i = 0; i < 3000; i++) {
    let rx = Math.sin(seed * 127.1 + i * 311.7) * 43758.5453;
    rx = rx - Math.floor(rx);
    let ry = Math.sin(seed * 269.5 + i * 183.3) * 43758.5453;
    ry = ry - Math.floor(ry);

    const px = Math.floor(rx * w);
    const py = Math.floor(ry * h);
    const idx = (py * w + px) * 4;

    if (idx >= 0 && idx < d.length - 3) {
      const noise = Math.floor(rx * 20);
      d[idx] = Math.min(255, d[idx] + noise);
      d[idx + 1] = Math.min(255, d[idx + 1] + Math.floor(noise * 0.1));
      d[idx + 2] = Math.min(255, d[idx + 2] + Math.floor(noise * 0.05));
    }
  }

  X.putImageData(imgData, 0, 0);
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(t) {
  const w = C.width, h = C.height;

  initComposition();

  // Clear to black
  X.fillStyle = '#000';
  X.fillRect(0, 0, w, h);

  // Architectural substrate
  drawSubstrate(t);

  // Compositional elements — layered
  drawRectangles(t);
  drawCircles(t);
  drawCurves(t);
  drawDiagonals(t);
  drawIntersections(t);
  drawPoints(t);

  // Grain texture
  drawGrain(t);

  // Very subtle scanlines
  X.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y = 0; y < h; y += 3) {
    X.fillRect(0, y, w, 1);
  }

  // Soft vignette
  const vg = X.createRadialGradient(w/2, h/2, Math.min(w,h)*0.35, w/2, h/2, Math.max(w,h)*0.75);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  X.fillStyle = vg;
  X.fillRect(0, 0, w, h);
}

let last = 0;
function frame() {
  if (!on) return;
  requestAnimationFrame(frame);
  const now = performance.now();
  const d = Math.min((now - last) / 1000, 0.05);
  last = now;
  T += d;
  if (T >= DUR) T -= DUR;
  render(T);
}

async function autoStart() {
  document.getElementById('start').classList.add('gone');
  if (!THUMB) await initAudio();
  on = true; last = performance.now();
  frame();
}

if (window.self !== window.top) { autoStart(); }
else { autoStart().catch(() => {
  document.getElementById('start').classList.remove('gone');
  document.getElementById('start').addEventListener('click', () => autoStart());
}); }
</script>
</body>
</html>
